<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bazar göstəriciləri — BizBazar.az</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- SEO -->
  <meta name="description" content="Azərbaycan biznes bazarının statistikaları: orta qiymət, gəlir, mənfəət, geri ödəmə müddəti hər kateqoriya üçün.">
  <meta name="keywords" content="biznes bazar göstəriciləri, biznes statistika, biznes orta qiymət">
  <meta name="author" content="BizBazar.az">
  <meta name="robots" content="index, follow">

  <!-- Open Graph (for social sharing) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Bazar göstəriciləri — BizBazar.az">
  <meta property="og:description" content="Azərbaycan biznes bazarının statistikaları: orta qiymət, gəlir, mənfəət, geri ödəmə müddəti hər kateqoriya üçün.">
  <meta property="og:url" content="https://bizbazar.az/benchmarks.html">
  <meta property="og:image" content="https://bizbazar.az/favicon.svg">
  <meta property="og:site_name" content="BizBazar.az">
  <meta property="og:locale" content="az_AZ">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Bazar göstəriciləri — BizBazar.az">
  <meta name="twitter:description" content="Azərbaycan biznes bazarının statistikaları: orta qiymət, gəlir, mənfəət, geri ödəmə müddəti hər kateqoriya üçün.">
  <meta name="twitter:image" content="https://bizbazar.az/favicon.svg">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://bizbazar.az/benchmarks.html">

  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .bm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 48px; }
    .bm-card { background: #fff; border-radius: 14px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.07); border: 1px solid #e2e8f0; }
    .bm-card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .bm-icon { font-size: 28px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: #f0f4ff; border-radius: 12px; flex-shrink: 0; }
    .bm-name { font-weight: 700; font-size: 15px; color: #0f172a; }
    .bm-trend { margin-left: auto; font-size: 20px; }
    .bm-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .bm-metric { background: #f8fafc; border-radius: 8px; padding: 10px 12px; }
    .bm-metric .mlbl { font-size: 11px; color: #64748b; margin-bottom: 3px; }
    .bm-metric .mval { font-size: 15px; font-weight: 700; color: #0f172a; }
    .demand-bar-wrap { margin-top: 14px; }
    .demand-label { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-bottom: 4px; }
    .demand-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
    .demand-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #2563eb, #10b981); transition: width .6s ease; }
    .chart-section { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
    .chart-section h2 { margin: 0 0 24px; font-size: 20px; }
    .chart-container { position: relative; height: 420px; }
    .trend-up { color: #16a34a; }
    .trend-down { color: #dc2626; }
    .trend-stable { color: #d97706; }
  </style>
  <script>(function(){if(localStorage.getItem('bb_darkmode')==='1')document.documentElement.setAttribute('data-theme','dark')})()</script>
</head>
<body>
<div id="header-mount"></div>

<div class="page-header">
  <div class="container">
    <h1 id="bm-h1"></h1>
    <p id="bm-sub"></p>
  </div>
</div>

<section>
  <div class="container">
    <div class="bm-grid" id="bm-grid"></div>
    <div class="chart-section">
      <h2 id="bm-chart-h2"></h2>
      <div class="chart-container">
        <canvas id="bm-chart"></canvas>
      </div>
    </div>
  </div>
</section>

<div id="footer-mount"></div>
<script src="js/app.js"></script>
<script>
(async function(){
  mountLayout("benchmarks");

  const BM_COPY = {
    az: {
      doc_title: "Bazar göstəriciləri — BizBazar.az",
      h1: "Bazar göstəriciləri",
      sub: "Kateqoriya üzrə ortalama qiymət, gəlir, mənfəət və tələb indeksi",
      chart_h2: "Kateqoriya üzrə ortalama satış qiyməti (AZN)",
      chart_label: "Ort. qiymət (AZN)",
      m_price: "Ort. qiymət", m_revenue: "Ort. gəlir/ay",
      m_profit: "Ort. mənfəət/ay", m_payback: "Geri ödəmə",
      months: "ay",
      demand: "Tələb indeksi",
      trend_up: "Artan tələb", trend_down: "Azalan tələb", trend_stable: "Sabit tələb"
    },
    en: {
      doc_title: "Market benchmarks — BizBazar.az",
      h1: "Market benchmarks",
      sub: "Average price, revenue, profit and demand index by category",
      chart_h2: "Average sale price by category (AZN)",
      chart_label: "Avg. price (AZN)",
      m_price: "Avg. price", m_revenue: "Avg. revenue/mo",
      m_profit: "Avg. profit/mo", m_payback: "Payback",
      months: "mo",
      demand: "Demand index",
      trend_up: "Rising demand", trend_down: "Falling demand", trend_stable: "Stable demand"
    },
    ru: {
      doc_title: "Рыночные показатели — BizBazar.az",
      h1: "Рыночные показатели",
      sub: "Средняя цена, доход, прибыль и индекс спроса по категориям",
      chart_h2: "Средняя цена продажи по категориям (AZN)",
      chart_label: "Ср. цена (AZN)",
      m_price: "Ср. цена", m_revenue: "Ср. доход/мес",
      m_profit: "Ср. прибыль/мес", m_payback: "Окупаемость",
      months: "мес.",
      demand: "Индекс спроса",
      trend_up: "Растущий спрос", trend_down: "Падающий спрос", trend_stable: "Стабильный спрос"
    }
  };
  const bm = () => BM_COPY[getLang()] || BM_COPY.az;

  const [benchmarksData, categories] = await Promise.all([
    loadJSON("data/benchmarks.json"),
    loadCategories()
  ]);
  const benchmarks = benchmarksData.by_category;
  const catById = Object.fromEntries(categories.map(c => [c.id, c]));
  let chartInstance = null;

  function trendArrow(trend) {
    const c = bm();
    if (trend === "up") return `<span class="bm-trend trend-up" title="${c.trend_up}">↑</span>`;
    if (trend === "down") return `<span class="bm-trend trend-down" title="${c.trend_down}">↓</span>`;
    return `<span class="bm-trend trend-stable" title="${c.trend_stable}">→</span>`;
  }

  function renderAll() {
    const c = bm();
    document.title = c.doc_title;
    document.getElementById("bm-h1").textContent = c.h1;
    document.getElementById("bm-sub").textContent = c.sub;
    document.getElementById("bm-chart-h2").textContent = c.chart_h2;

    const grid = document.getElementById("bm-grid");
    grid.innerHTML = benchmarks.map(b => {
      const cat = catById[b.id];
      const icon = CATEGORY_ICONS[b.id] || "🏢";
      const name = catLabel(cat) || b.id;
      return `
      <div class="bm-card">
        <div class="bm-card-head">
          <div class="bm-icon">${icon}</div>
          <div class="bm-name">${name}</div>
          ${trendArrow(b.trend)}
        </div>
        <div class="bm-metrics">
          <div class="bm-metric">
            <div class="mlbl">${c.m_price}</div>
            <div class="mval">${fmtAZN(b.avg_price_azn)}</div>
          </div>
          <div class="bm-metric">
            <div class="mlbl">${c.m_revenue}</div>
            <div class="mval">${fmtAZN(b.avg_revenue_azn)}</div>
          </div>
          <div class="bm-metric">
            <div class="mlbl">${c.m_profit}</div>
            <div class="mval">${fmtAZN(b.avg_profit_azn)}</div>
          </div>
          <div class="bm-metric">
            <div class="mlbl">${c.m_payback}</div>
            <div class="mval">${b.avg_payback_months} ${c.months}</div>
          </div>
        </div>
        <div class="demand-bar-wrap">
          <div class="demand-label">
            <span>${c.demand}</span>
            <span>${b.demand_index}/100</span>
          </div>
          <div class="demand-bar">
            <div class="demand-bar-fill" style="width:${b.demand_index}%"></div>
          </div>
        </div>
      </div>`;
    }).join("");

    const labels = benchmarks.map(b => {
      const cat = catById[b.id];
      return catLabel(cat) || b.id;
    });
    const prices = benchmarks.map(b => b.avg_price_azn);
    const colors = benchmarks.map(b => {
      if (b.trend === "up") return "rgba(37, 99, 235, 0.82)";
      if (b.trend === "down") return "rgba(220, 38, 38, 0.7)";
      return "rgba(100, 116, 139, 0.7)";
    });

    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(document.getElementById("bm-chart"), {
      type: "bar",
      data: {
        labels,
        datasets: [{
          label: c.chart_label,
          data: prices,
          backgroundColor: colors,
          borderRadius: 6,
          borderSkipped: false
        }]
      },
      options: {
        indexAxis: "y",
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: { label: ctx => " " + fmtAZN(ctx.parsed.x) }
          }
        },
        scales: {
          x: { grid: { color: "#f1f5f9" }, ticks: { callback: v => fmtAZN(v) } },
          y: { grid: { display: false } }
        }
      }
    });

    applyI18n();
  }

  renderAll();
  window.addEventListener("langchange", renderAll);
})();
</script>
</body>
</html>
