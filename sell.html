<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Biznesini sat — BizBazar.az</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- SEO -->
  <meta name="description" content="Bizneslərini satmaq üçün ən sürətli yol. Yoxlanmış alıcı bazası, peşəkar dəstək, məxfilik. Pulsuz başla.">
  <meta name="keywords" content="biznes sat, biznes satmaq, biznes elan ver, biznes broker">
  <meta name="author" content="BizBazar.az">
  <meta name="robots" content="index, follow">

  <!-- Open Graph (for social sharing) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Biznesini sat — BizBazar.az">
  <meta property="og:description" content="Bizneslərini satmaq üçün ən sürətli yol. Yoxlanmış alıcı bazası, peşəkar dəstək, məxfilik. Pulsuz başla.">
  <meta property="og:url" content="https://bizbazar.az/sell.html">
  <meta property="og:image" content="https://bizbazar.az/favicon.svg">
  <meta property="og:site_name" content="BizBazar.az">
  <meta property="og:locale" content="az_AZ">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Biznesini sat — BizBazar.az">
  <meta name="twitter:description" content="Bizneslərini satmaq üçün ən sürətli yol. Yoxlanmış alıcı bazası, peşəkar dəstək, məxfilik. Pulsuz başla.">
  <meta name="twitter:image" content="https://bizbazar.az/favicon.svg">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://bizbazar.az/sell.html">

  <link rel="stylesheet" href="css/styles.css">
  <script>(function(){if(localStorage.getItem('bb_darkmode')==='1')document.documentElement.setAttribute('data-theme','dark')})()</script>
</head>
<body>
<div id="header-mount"></div>

<section class="sell-hero">
  <div class="container">
    <h1 data-i18n="sell_title"></h1>
    <p data-i18n="sell_sub"></p>
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <h3 data-i18n="sell_step1_t"></h3>
        <p data-i18n="sell_step1_d"></p>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <h3 data-i18n="sell_step2_t"></h3>
        <p data-i18n="sell_step2_d"></p>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <h3 data-i18n="sell_step3_t"></h3>
        <p data-i18n="sell_step3_d"></p>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <h3 data-i18n="sell_step4_t"></h3>
        <p data-i18n="sell_step4_d"></p>
      </div>
    </div>
  </div>
</section>

<!-- A) Pricing plans section -->
<section style="background:var(--bg-soft)">
  <div class="container">
    <div class="section-head"><div><h2 data-i18n="pricing_title"></h2></div></div>
    <div class="plans-grid" id="plans-grid"></div>
  </div>
</section>

<section>
  <div class="container form-wrap">
    <!-- Tap.az import widget (bookmarklet) -->
    <div class="form-card" style="margin-bottom:16px; border:1px dashed var(--border, #d1d5db); background:var(--bg-soft, #f9fafb);">
      <h2 style="margin:0 0 8px; font-size:18px;" data-i18n="import_title"></h2>
      <p style="margin:0 0 12px; color:var(--muted, #6b7280); font-size:14px;" data-i18n="import_sub"></p>

      <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px;">
        <!-- The bookmarklet link — user drags this to their bookmarks bar -->
        <a id="bb-bookmarklet" href="#" class="btn btn-primary" style="font-weight:600; cursor:grab;" title="Drag to bookmarks bar">
          ★ <span data-i18n="import_bm_label"></span>
        </a>
        <button type="button" id="bb-bookmarklet-copy" class="btn btn-outline" data-i18n="import_bm_copy"></button>
        <button type="button" id="bb-bookmarklet-help" class="btn btn-ghost" style="background:transparent; text-decoration:underline;" data-i18n="import_bm_how"></button>
      </div>

      <details id="bb-bookmarklet-help-panel" style="margin-top:6px;">
        <summary style="cursor:pointer; font-size:13px; color:var(--muted, #6b7280);" data-i18n="import_bm_steps_title"></summary>
        <ol style="margin:10px 0 0 18px; font-size:13px; line-height:1.6;">
          <li data-i18n="import_bm_step1"></li>
          <li data-i18n="import_bm_step2"></li>
          <li data-i18n="import_bm_step3"></li>
        </ol>
      </details>

      <div id="tapaz-msg" style="margin-top:10px; font-size:13px; display:none;"></div>
    </div>

    <div class="form-card">
      <h2 style="margin:0 0 18px" data-i18n="form_title"></h2>
      <div class="form-note" data-i18n="form_note"></div>
      <!-- B) Form updated: web3forms action, hidden fields, JS fetch on submit -->
      <form id="sell-form" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
        <input type="hidden" name="subject" value="New BizBazar.az listing submission">
        <div class="form-row">
          <div class="form-field full">
            <label data-i18n="form_name"></label>
            <input type="text" name="business_name" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label data-i18n="form_cat"></label>
            <select id="form-cat" name="category" required></select>
          </div>
          <div class="form-field">
            <label data-i18n="form_city"></label>
            <input type="text" name="city" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label data-i18n="form_district"></label>
            <input type="text" name="district">
          </div>
          <div class="form-field">
            <label data-i18n="form_area"></label>
            <input type="number" name="area_m2" min="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label data-i18n="form_price"></label>
            <input type="number" name="price_azn" min="0" required>
          </div>
          <div class="form-field">
            <label data-i18n="form_revenue"></label>
            <input type="number" name="monthly_revenue_azn" min="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label data-i18n="form_staff"></label>
            <input type="number" name="staff_count" min="0">
          </div>
          <div class="form-field">
            <label data-i18n="form_years"></label>
            <input type="number" name="operating_years" min="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field full">
            <label data-i18n="form_desc"></label>
            <textarea name="description" required></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label data-i18n="form_email"></label>
            <input type="email" name="email" required>
          </div>
          <div class="form-field">
            <label data-i18n="form_phone"></label>
            <input type="tel" name="phone" required>
          </div>
        </div>
        <button class="btn btn-primary btn-lg" type="submit" style="width:100%" data-i18n="form_submit"></button>
      </form>
      <div id="form-success" style="display:none; margin-top: 14px; padding: 14px; background: #ecfdf5; color: #065f46; border-radius: 8px; font-size: 14px;" data-i18n="form_sent"></div>
    </div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="js/app.js"></script>
<script>
(async function(){
  mountLayout("sell");
  const [categories, plans] = await Promise.all([loadCategories(), loadPlans()]);

  const catSel = document.getElementById("form-cat");
  categories.forEach(c => {
    const o = document.createElement("option");
    o.value = c.id; o.textContent = catLabel(c);
    catSel.appendChild(o);
  });

  // A) Render pricing plans
  const plansGrid = document.getElementById("plans-grid");
  plansGrid.innerHTML = plans.map(plan => {
    const name     = getLang() === "az" ? plan.name_az     : plan.name_en;
    const duration = getLang() === "az" ? plan.duration_az : plan.duration_en;
    const features = getLang() === "az" ? plan.features_az : plan.features_en;
    const priceStr = plan.price_azn === 0
      ? t("plan_free_price")
      : fmtAZN(plan.price_azn);
    const highlightClass = plan.highlight ? " highlight" : "";
    const badge = plan.highlight
      ? `<div class="plan-badge" data-i18n="badge_featured"></div>` : "";
    return `
      <div class="plan-card${highlightClass}">
        ${badge}
        <div class="plan-name">${name}</div>
        <div class="plan-price">${priceStr}</div>
        <div class="plan-duration">${duration}</div>
        <ul class="plan-features">
          ${features.map(f => `<li>${f}</li>`).join("")}
        </ul>
        <button class="btn ${plan.highlight ? "btn-primary" : "btn-outline"} btn-lg plan-cta" style="width:100%;margin-top:auto;" data-i18n="plan_cta"></button>
      </div>
    `;
  }).join("");

  applyI18n();

  // B) Form submit via fetch
  const form = document.getElementById("sell-form");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const submitBtn = form.querySelector('[type="submit"]');
    submitBtn.disabled = true;
    try {
      const data = new FormData(form);
      const resp = await fetch("https://api.web3forms.com/submit", {
        method: "POST",
        body: data
      });
      const json = await resp.json();
      if (json.success) {
        form.style.display = "none";
        const successEl = document.getElementById("form-success");
        successEl.style.display = "block";
        window.scrollTo({ top: successEl.offsetTop - 100, behavior: "smooth" });
      } else {
        submitBtn.disabled = false;
        alert(getLang() === "az"
          ? "Xəta baş verdi. Zəhmət olmasa yenidən cəhd edin."
          : "An error occurred. Please try again.");
      }
    } catch(err) {
      submitBtn.disabled = false;
      alert(getLang() === "az"
        ? "Şəbəkə xətası. Zəhmət olmasa yenidən cəhd edin."
        : "Network error. Please try again.");
    }
  });

  // ===== Tap.az import via bookmarklet =====
  const tapMsg = document.getElementById("tapaz-msg");
  function showMsg(text, type) {
    tapMsg.style.display = "block";
    tapMsg.textContent = text;
    tapMsg.style.color = type === "err" ? "#b91c1c" : (type === "ok" ? "#065f46" : "#374151");
  }

  // Bookmarklet payload — runs in tap.az page context.
  // Primary parsing source: document.title — tap.az format is
  // "{title}: {price} AZN — {city}, Azərbaycan | {id} — Tap.Az"
  const bookmarkletSrc = `(function(){
    var d=document;
    var ttl='',price='',city='';
    var m=d.title.match(/^(.+?):\\s*([\\d\\s.,]+)\\s*AZN\\s*[—–\\-]+\\s*(.+?),\\s*Azərbaycan/i);
    if(m){ttl=m[1].trim();price=parseInt(m[2].replace(/[\\s.,]/g,''),10)||'';city=m[3].trim();}
    if(!ttl){var h=d.querySelector('h1.product-title')||d.querySelector('h1');ttl=h?h.textContent.trim():'';}
    if(!price){var pEl=d.querySelector('.product-price')||d.querySelector('[class*="price"]');var pt=pEl?pEl.textContent:'';var pm=pt.match(/(\\d[\\d\\s.,]{0,12})\\s*(?:AZN|man|₼)/i);price=pm?parseInt(pm[1].replace(/[\\s.,]/g,''),10):'';}
    var dEl=d.querySelector('.product-description-container')||d.querySelector('[class*="description"]');
    var desc=dEl?dEl.textContent.trim().slice(0,800):'';
    var data={t:ttl,p:price,c:city,d:desc,s:location.href};
    var enc=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    window.open('https://bizbazar.az/sell.html?bb_import='+enc,'_blank');
  })();`;
  const bookmarkletHref = "javascript:" + encodeURIComponent(bookmarkletSrc.replace(/\s+/g, " "));

  const bmLink = document.getElementById("bb-bookmarklet");
  bmLink.setAttribute("href", bookmarkletHref);
  bmLink.addEventListener("click", (e) => {
    e.preventDefault();
    showMsg(t("import_bm_drag_hint") || "Drag this button to your bookmarks bar", "info");
  });

  const bmCopy = document.getElementById("bb-bookmarklet-copy");
  bmCopy.addEventListener("click", async () => {
    try {
      await navigator.clipboard.writeText(bookmarkletHref);
      showMsg(t("import_bm_copied") || "Copied!", "ok");
    } catch (err) {
      // Fallback: select-via-prompt
      window.prompt(t("import_bm_copy_manual") || "Copy this:", bookmarkletHref);
    }
  });

  const bmHelp = document.getElementById("bb-bookmarklet-help");
  bmHelp.addEventListener("click", () => {
    const panel = document.getElementById("bb-bookmarklet-help-panel");
    panel.open = !panel.open;
    if (panel.open) panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
  });

  // Prefill the form if landed from bookmarklet (?bb_import=BASE64)
  function fillForm(data) {
    const f = document.getElementById("sell-form");
    if (data.t) f.elements.business_name.value = data.t;
    if (data.p) f.elements.price_azn.value = data.p;
    if (data.c) f.elements.city.value = data.c;
    if (data.d) f.elements.description.value = data.d;
    if (data.s) {
      // Append source link as note in description
      const note = "\n\n[" + (t("import_source_label") || "Source") + ": " + data.s + "]";
      if (data.d && !f.elements.description.value.includes(data.s)) {
        f.elements.description.value += note;
      }
    }
  }
  try {
    const params = new URLSearchParams(location.search);
    const enc = params.get("bb_import");
    if (enc) {
      const json = decodeURIComponent(escape(atob(enc)));
      const data = JSON.parse(json);
      fillForm(data);
      showMsg(t("import_success") || "Filled.", "ok");
      document.querySelector("#sell-form")?.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  } catch (e) {
    // bad/missing param — ignore silently
  }

  // Scroll to form when a plan CTA is clicked
  document.querySelectorAll(".plan-cta").forEach(btn => {
    btn.addEventListener("click", () => {
      const formCard = document.querySelector(".form-card");
      if (formCard) formCard.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  });

  window.addEventListener("langchange", () => location.reload());
})();
</script>
</body>
</html>
