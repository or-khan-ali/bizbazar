  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ====== HERO ====== */
    .inv-hero {
      background:
        radial-gradient(circle at 20% 0%, rgba(99,102,241,.14) 0%, transparent 50%),
        radial-gradient(circle at 80% 100%, rgba(168,85,247,.10) 0%, transparent 50%),
        linear-gradient(180deg, #f5f3ff 0%, #ffffff 100%);
      padding: 72px 0 48px;
      position: relative;
      overflow: hidden;
    }
    .inv-hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(99,102,241,.10);
      color: #4f46e5;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .inv-hero h1 {
      font-size: 44px;
      font-weight: 800;
      margin: 0 0 14px;
      letter-spacing: -0.025em;
      line-height: 1.1;
      max-width: 720px;
    }
    .inv-hero h1 span { color: #6366f1; }
    .inv-hero-lead {
      color: var(--text-muted);
      font-size: 18px;
      max-width: 680px;
      line-height: 1.55;
      margin: 0 0 32px;
    }
    .inv-trust-strip {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      padding-top: 28px;
      border-top: 1px solid rgba(99,102,241,.15);
      margin-top: 32px;
    }
    .inv-trust-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
    }
    .inv-trust-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .inv-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 36px;
    }
    .inv-stat {
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .inv-stat:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,.10); }
    .inv-stat-num {
      font-size: 28px;
      font-weight: 800;
      color: #4f46e5;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .inv-stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ====== FILTERS ====== */
    .inv-filter-bar {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,.03);
    }
    .inv-filter-bar select {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      background: #fafafa;
      cursor: pointer;
      flex: 1 1 160px;
      transition: all .15s ease;
    }
    .inv-filter-bar select:hover { border-color: #6366f1; background: white; }
    .inv-filter-bar select:focus { outline: none; border-color: #6366f1; background: white; box-shadow: 0 0 0 3px rgba(99,102,241,.12); }

    .inv-results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .inv-count-text { font-size: 14px; color: var(--text-muted); }
    .inv-count-text strong { color: var(--text); font-weight: 700; }

    /* ====== INVESTOR CARDS ====== */
    .inv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 24px;
    }

    .inv-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      overflow: hidden;
      transition: all .25s cubic-bezier(.4, 0, .2, 1);
    }
    .inv-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(99,102,241,.14);
      border-color: #c7d2fe;
    }
    .inv-card.featured {
      border: 2px solid #6366f1;
      background: linear-gradient(180deg, #fafaff 0%, #ffffff 60%);
    }
    .inv-card.featured::after {
      content: "★ Premium";
      position: absolute;
      top: 16px;
      right: 16px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 999px;
      letter-spacing: 0.3px;
    }

    /* card head */
    .inv-card-head {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .inv-avatar {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #ede9fe, #c7d2fe);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      color: #4f46e5;
      box-shadow: inset 0 0 0 1px rgba(99,102,241,.15);
    }
    .inv-card.featured .inv-avatar {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white;
    }
    .inv-name-block { flex: 1; min-width: 0; }
    .inv-name {
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
      margin: 0 0 4px;
      letter-spacing: -0.01em;
    }
    .inv-name-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .inv-verified-icon {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #10b981;
      font-weight: 600;
      font-size: 13px;
    }

    /* type + intent badges */
    .inv-tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .inv-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .inv-tag.individual { background: #f3e8ff; color: #7c3aed; }
    .inv-tag.corporate  { background: #dbeafe; color: #1d4ed8; }
    .inv-tag.buy        { background: #d1fae5; color: #047857; }
    .inv-tag.invest     { background: #fef3c7; color: #b45309; }

    /* budget block */
    .inv-budget {
      background: linear-gradient(135deg, #faf5ff 0%, #f0f9ff 100%);
      border: 1px solid #ede9fe;
      border-radius: 14px;
      padding: 16px 18px;
    }
    .inv-budget-label {
      font-size: 12px;
      color: #6d28d9;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .inv-budget-value {
      font-size: 22px;
      font-weight: 800;
      color: #1e1b4b;
      letter-spacing: -0.02em;
    }
    .inv-budget-value .sep { color: #a78bfa; margin: 0 6px; }
    .inv-budget-bar {
      height: 4px;
      background: #ede9fe;
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
    }
    .inv-budget-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #a78bfa, #6366f1);
      border-radius: 2px;
    }

    /* sectors */
    .inv-sectors-block .inv-section-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .inv-sector-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .inv-sector-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #f5f3ff;
      color: #4338ca;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
    }

    /* description */
    .inv-desc {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      margin: 0;
    }

    /* meta row */
    .inv-meta-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 14px 0;
      border-top: 1px dashed var(--border);
      border-bottom: 1px dashed var(--border);
    }
    .inv-meta-cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .inv-meta-cell-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
    }
    .inv-meta-cell-value {
      font-size: 14px;
      color: var(--text);
      font-weight: 600;
    }
    .inv-rating { color: #f59e0b; }

    /* actions */
    .inv-actions {
      display: flex;
      gap: 8px;
    }
    .inv-actions .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      border: none;
      box-shadow: 0 4px 12px rgba(99,102,241,.30);
    }
    .inv-actions .btn-primary:hover {
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      box-shadow: 0 6px 16px rgba(99,102,241,.40);
      transform: translateY(-1px);
    }
    .inv-icon-btn {
      width: 44px;
      height: 44px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: white;
      transition: all .15s ease;
      font-size: 18px;
      text-decoration: none;
      color: var(--text);
    }
    .inv-icon-btn:hover {
      border-color: #6366f1;
      background: #f5f3ff;
      transform: translateY(-1px);
    }

    /* empty state */
    .inv-empty {
      text-align: center;
      padding: 80px 20px;
      background: white;
      border: 2px dashed var(--border);
      border-radius: 16px;
    }
    .inv-empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
    .inv-empty-title { font-size: 18px; font-weight: 700; margin: 0 0 6px; }
    .inv-empty-text { color: var(--text-muted); margin: 0; }

    /* ====== CTA SECTION ====== */
    .inv-cta-section {
      background:
        radial-gradient(circle at 0% 0%, rgba(255,255,255,.10) 0%, transparent 50%),
        linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 24px;
      padding: 56px 48px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .inv-cta-section::before {
      content: "";
      position: absolute;
      top: -100px;
      right: -100px;
      width: 300px;
      height: 300px;
      background: rgba(255,255,255,.06);
      border-radius: 50%;
    }
    .inv-cta-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 40px;
      align-items: center;
      position: relative;
    }
    .inv-cta-grid h2 {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 14px;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }
    .inv-cta-grid p {
      font-size: 16px;
      opacity: 0.92;
      line-height: 1.6;
      margin: 0 0 24px;
    }
    .inv-cta-benefits {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .inv-cta-benefit {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }
    .inv-cta-benefit-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,.20);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
    }
    .inv-cta-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .inv-cta-actions .btn {
      background: white;
      color: #4f46e5;
      font-weight: 700;
      padding: 14px 24px;
      font-size: 15px;
      border: none;
      box-shadow: 0 4px 16px rgba(0,0,0,.20);
    }
    .inv-cta-actions .btn:hover { transform: translateY(-2px); }
    .inv-cta-actions .btn-secondary {
      background: rgba(255,255,255,.12);
      color: white;
      border: 1.5px solid rgba(255,255,255,.30);
      box-shadow: none;
    }
    .inv-cta-actions .btn-secondary:hover { background: rgba(255,255,255,.20); }

    /* responsive */
    @media (max-width: 768px) {
      .inv-hero h1 { font-size: 32px; }
      .inv-hero-lead { font-size: 16px; }
      .inv-stats-grid { grid-template-columns: repeat(2, 1fr); }
      .inv-grid { grid-template-columns: 1fr; }
      .inv-cta-section { padding: 40px 28px; }
      .inv-cta-grid { grid-template-columns: 1fr; gap: 28px; }
      .inv-cta-grid h2 { font-size: 24px; }
    }
    @media (max-width: 480px) {
      .inv-stats-grid { grid-template-columns: 1fr; }
      .inv-trust-strip { gap: 14px; }
      .inv-card { padding: 22px; }
    }
  </style>
  <script>(function(){if(localStorage.getItem('bb_darkmode')==='1')document.documentElement.setAttribute('data-theme','dark')})()</script>
</head>

<script>

  function loadInvestors() { return loadJSON('data/investors.json'); }

<script>

<script>
(async function(){
  mountLayout("investors");

  const [investors, categories] = await Promise.all([
    loadInvestors(), loadCategories()
  ]);
  const catById = Object.fromEntries(categories.map(c => [c.id, c]));

  // Compute stats
  const totalVolume = investors.reduce((s, i) => s + (i.budget_max_azn || 0), 0);
  const totalDeals = investors.reduce((s, i) => s + (i.deals_done || 0), 0);
  const verifiedCount = investors.filter(i => i.verified).length;

  document.getElementById("stat-investors").textContent = investors.length;
  document.getElementById("stat-volume").textContent = (totalVolume / 1000000).toFixed(1) + "M+";
  document.getElementById("stat-deals").textContent = totalDeals + "+";
  document.getElementById("stat-verified").textContent = Math.round((verifiedCount / investors.length) * 100) + "%";

  // Populate sector filter
  const filterSector = document.getElementById("filter-sector");
  const usedSectors = [...new Set(investors.flatMap(i => i.sectors))];
  usedSectors.forEach(sid => {
    const cat = catById[sid];
    if (!cat) return;
    const o = document.createElement("option");
    o.value = sid;
    o.textContent = catLabel(cat);
    filterSector.appendChild(o);
  });

  // Find max budget for budget bar visualization
  const maxBudget = Math.max(...investors.map(i => i.budget_max_azn));

  const state = { type: "", sector: "", budget: "", txn: "", sort: "featured" };

  const TYPE_ICONS = { individual: "👤", corporate: "🏢" };
  const TYPE_LABELS = {
    az: { individual: "Fərdi", corporate: "Korporativ" },
    en: { individual: "Individual", corporate: "Corporate" },
    ru: { individual: "Частный", corporate: "Корпоративный" }
  };
  const INTENT_LABELS = {
    az: { buy: "Almaq istəyir", invest: "Ortaqlıq axtarır" },
    en: { buy: "Looking to buy", invest: "Seeking partnership" },
    ru: { buy: "Хочет купить", invest: "Ищет партнёрство" }
  };

  function render() {
    let list = investors.slice();

    if (state.type) list = list.filter(i => i.type === state.type);
    if (state.sector) list = list.filter(i => i.sectors.includes(state.sector));
    if (state.budget) {
      const [min, max] = state.budget.split("-").map(Number);
      list = list.filter(i => i.budget_max_azn >= min && i.budget_min_azn <= max);
    }
    if (state.txn) list = list.filter(i => i.transaction_type === state.txn);

    switch (state.sort) {
      case "budget-high": list.sort((a, b) => b.budget_max_azn - a.budget_max_azn); break;
      case "budget-low":  list.sort((a, b) => a.budget_min_azn - b.budget_min_azn); break;
      case "deals":       list.sort((a, b) => b.deals_done - a.deals_done); break;
      case "rating":      list.sort((a, b) => b.rating - a.rating); break;
      default:            list.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0)); break;
    }

    document.getElementById("results-count").textContent = list.length;

    const grid = document.getElementById("investor-grid");
    if (!list.length) {
      grid.innerHTML = "";
      document.getElementById("empty-state").style.display = "block";
      return;
    }
    document.getElementById("empty-state").style.display = "none";
    grid.innerHTML = list.map(inv => investorCardHTML(inv)).join("");
    applyI18n();
  }

  function investorCardHTML(inv) {
    const lang = getLang();
    const alias = lang === "az" ? inv.alias : inv.alias_en;
    const desc =
      lang === "en" ? inv.description_en :
      lang === "ru" ? (inv.description_ru || inv.description_az) :
      inv.description_az;

    const typeLabels = TYPE_LABELS[lang] || TYPE_LABELS.az;
    const intentLabels = INTENT_LABELS[lang] || INTENT_LABELS.az;
    const stars = "★".repeat(Math.round(inv.rating)) + "☆".repeat(5 - Math.round(inv.rating));

    const sectorPills = inv.sectors.map(sid => {
      const cat = catById[sid];
      return cat ? `<span class="inv-sector-pill">${CATEGORY_ICONS[sid] || "🏢"} ${catLabel(cat)}</span>` : "";
    }).join("");

    const budgetPercent = Math.min(100, Math.round((inv.budget_max_azn / maxBudget) * 100));

    return `
    <article class="inv-card${inv.featured ? " featured" : ""}">
      <div class="inv-card-head">
        <div class="inv-avatar">${TYPE_ICONS[inv.type] || "👤"}</div>
        <div class="inv-name-block">
          <h3 class="inv-name">${alias}</h3>
          <div class="inv-name-meta">
            <span>📍 ${inv.location}</span>
            ${inv.verified ? `<span class="inv-verified-icon">✓ ${t("verified")}</span>` : ""}
          </div>
        </div>
      </div>

      <div class="inv-tag-row">
        <span class="inv-tag ${inv.type}">${typeLabels[inv.type] || inv.type}</span>
        <span class="inv-tag ${inv.transaction_type}">${intentLabels[inv.transaction_type] || inv.transaction_type}</span>
      </div>

      <div class="inv-budget">
        <div class="inv-budget-label" data-i18n="inv_budget_label"></div>
        <div class="inv-budget-value">
          ${fmtAZN(inv.budget_min_azn)}<span class="sep">–</span>${fmtAZN(inv.budget_max_azn)}
        </div>
        <div class="inv-budget-bar">
          <div class="inv-budget-bar-fill" style="width:${budgetPercent}%"></div>
        </div>
      </div>

      <div class="inv-sectors-block">
        <div class="inv-section-label" data-i18n="inv_sectors_label"></div>
        <div class="inv-sector-pills">${sectorPills}</div>
      </div>

      <p class="inv-desc">${desc}</p>

      <div class="inv-meta-row">
        <div class="inv-meta-cell">
          <span class="inv-meta-cell-label" data-i18n="inv_rating_label"></span>
          <span class="inv-meta-cell-value"><span class="inv-rating">${stars}</span> ${inv.rating.toFixed(1)}</span>
        </div>
        <div class="inv-meta-cell">
          <span class="inv-meta-cell-label" data-i18n="inv_deals_label"></span>
          <span class="inv-meta-cell-value">${inv.deals_done} ${t("broker_deals")}</span>
        </div>
      </div>

      <div class="inv-actions">
        <a href="https://wa.me/994502009088" target="_blank" rel="noopener" class="btn btn-primary" data-i18n="inv_action_connect"></a>
        <a href="https://wa.me/994502009088" target="_blank" rel="noopener" class="inv-icon-btn" title="WhatsApp">📱</a>
      </div>
    </article>`;
  }

  document.getElementById("filter-type").onchange   = e => { state.type   = e.target.value; render(); };
  document.getElementById("filter-sector").onchange = e => { state.sector = e.target.value; render(); };
  document.getElementById("filter-budget").onchange = e => { state.budget = e.target.value; render(); };
  document.getElementById("filter-txn").onchange    = e => { state.txn    = e.target.value; render(); };
  document.getElementById("filter-sort").onchange   = e => { state.sort   = e.target.value; render(); };

  render();
  applyI18n();
  window.addEventListener("langchange", () => location.reload());
})();
</script>
</body>
</html>
