<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Saxlanmış elanlar — BizBazar.az</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- SEO -->
  <meta name="description" content="Sevimlilərə əlavə etdiyiniz biznes elanları.">
  <meta name="keywords" content="saxlanmış biznes, sevimli elanlar">
  <meta name="author" content="BizBazar.az">
  <meta name="robots" content="index, follow">

  <!-- Open Graph (for social sharing) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Saxlanmış elanlar — BizBazar.az">
  <meta property="og:description" content="Sevimlilərə əlavə etdiyiniz biznes elanları.">
  <meta property="og:url" content="https://bizbazar.az/favorites.html">
  <meta property="og:image" content="https://bizbazar.az/favicon.svg">
  <meta property="og:site_name" content="BizBazar.az">
  <meta property="og:locale" content="az_AZ">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Saxlanmış elanlar — BizBazar.az">
  <meta name="twitter:description" content="Sevimlilərə əlavə etdiyiniz biznes elanları.">
  <meta name="twitter:image" content="https://bizbazar.az/favicon.svg">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://bizbazar.az/favorites.html">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="header-mount"></div>

<div class="page-header">
  <div class="container">
    <h1 data-i18n="nav_favorites"></h1>
    <p data-i18n="featured_sub"></p>
  </div>
</div>

<section>
  <div class="container">
    <div class="section-head">
      <div>
        <h2 data-i18n="nav_favorites"></h2>
        <p class="section-sub" id="fav-count"></p>
      </div>
    </div>
    <div class="listing-grid" id="fav-grid"></div>
    <div id="fav-empty" style="display:none;text-align:center;padding:80px 0;">
      <div style="font-size:48px">&#9825;</div>
      <h3 data-i18n="nav_favorites"></h3>
      <p style="color:#64748b">Hələ heç bir elan saxlanmayıb. Elanların üzərindəki ♥ düyməsini basın.</p>
      <a href="listings.html" class="btn btn-primary" style="margin-top:16px" data-i18n="nav_browse"></a>
    </div>
  </div>
</section>

<div id="footer-mount"></div>
<script src="js/app.js"></script>
<script>
(async function(){
  mountLayout("favorites");
  const favIds = getFavorites();
  if (!favIds.length) {
    document.getElementById("fav-empty").style.display = "block";
    applyI18n();
    return;
  }
  const [listings, categories] = await Promise.all([loadListings(), loadCategories()]);
  const catById = Object.fromEntries(categories.map(c => [c.id, c]));
  const favs = listings.filter(l => favIds.includes(l.id));
  const countEl = document.getElementById("fav-count");
  countEl.textContent = favs.length + " " + t("results_count");
  if (favs.length === 0) {
    document.getElementById("fav-empty").style.display = "block";
  } else {
    document.getElementById("fav-grid").innerHTML = favs.map(l => listingCardHTML(l, catById)).join("");
  }
  applyI18n();
  window.addEventListener("langchange", () => location.reload());
})();
</script>
</body>
</html>
