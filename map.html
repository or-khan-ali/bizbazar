<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bizneslərin xəritəsi — BizBazar.az</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- SEO -->
  <meta name="description" content="Bütün bizneslərini Bakı və Azərbaycan xəritəsində görün. Marker üzərinə klik edib elan detallarına baxın.">
  <meta name="keywords" content="biznes xəritə, Bakı biznes xəritə">
  <meta name="author" content="BizBazar.az">
  <meta name="robots" content="index, follow">

  <!-- Open Graph (for social sharing) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Bizneslərin xəritəsi — BizBazar.az">
  <meta property="og:description" content="Bütün bizneslərini Bakı və Azərbaycan xəritəsində görün. Marker üzərinə klik edib elan detallarına baxın.">
  <meta property="og:url" content="https://bizbazar.az/map.html">
  <meta property="og:image" content="https://bizbazar.az/favicon.svg">
  <meta property="og:site_name" content="BizBazar.az">
  <meta property="og:locale" content="az_AZ">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Bizneslərin xəritəsi — BizBazar.az">
  <meta name="twitter:description" content="Bütün bizneslərini Bakı və Azərbaycan xəritəsində görün. Marker üzərinə klik edib elan detallarına baxın.">
  <meta name="twitter:image" content="https://bizbazar.az/favicon.svg">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://bizbazar.az/map.html">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    .map-layout { display: grid; grid-template-columns: 1fr 320px; gap: 0; height: calc(100vh - 140px); min-height: 500px; }
    @media(max-width:800px) { .map-layout { grid-template-columns: 1fr; height: auto; } }
    #map { height: 100%; min-height: 400px; border-radius: 0 0 0 12px; z-index: 1; }
    .map-sidebar { background: #fff; border-left: 1px solid #e2e8f0; overflow-y: auto; padding: 0; display: flex; flex-direction: column; }
    .map-sidebar-head { padding: 16px 18px; border-bottom: 1px solid #e2e8f0; background: #1e3a5f; color: #fff; }
    .map-sidebar-head h3 { margin: 0; font-size: 16px; }
    .map-count-badge { display: inline-block; background: #2563eb; color: #fff; border-radius: 20px; padding: 3px 12px; font-size: 13px; font-weight: 700; margin-top: 6px; }
    .map-listing-list { flex: 1; overflow-y: auto; }
    .map-listing-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background .15s; text-decoration: none; color: inherit; }
    .map-listing-item:hover { background: #eff6ff; }
    .map-listing-item.featured { border-left: 3px solid #f59e0b; }
    .map-item-icon { font-size: 22px; flex-shrink: 0; width: 38px; height: 38px; background: #f1f5f9; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .map-item-icon.featured { background: #fef3c7; }
    .map-item-body { flex: 1; min-width: 0; }
    .map-item-title { font-weight: 600; font-size: 13px; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .map-item-loc { font-size: 11px; color: #64748b; margin-top: 2px; }
    .map-item-price { font-weight: 700; font-size: 13px; color: #1e3a5f; margin-top: 3px; }
    .map-filters { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; }
    .map-filters select { width: 100%; padding: 8px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; background: #fff; }
    .popup-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .popup-price { font-weight: 800; color: #1e3a5f; margin-bottom: 6px; font-size: 15px; }
    .popup-link { display: inline-block; background: #2563eb; color: #fff; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; text-decoration: none; }
    .map-legend { display: flex; gap: 16px; padding: 10px 16px; border-top: 1px solid #e2e8f0; font-size: 12px; color: #374151; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
    @media(max-width:800px) { #map { height: 400px; border-radius: 0; } .map-sidebar { max-height: 400px; border-left: none; border-top: 1px solid #e2e8f0; } }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a73e8">
  <script>(function(){if(localStorage.getItem('bb_darkmode')==='1')document.documentElement.setAttribute('data-theme','dark')})()</script>
</head>
<body>
<div id="header-mount"></div>

<div class="page-header" style="padding:20px 0;">
  <div class="container">
    <h1>Xəritədə elanlar</h1>
    <p>Bakı və ətrafında satışda olan bizneslər</p>
  </div>
</div>

<div class="map-layout">
  <div id="map"></div>
  <div class="map-sidebar">
    <div class="map-sidebar-head">
      <h3>Elanlar</h3>
      <div class="map-count-badge" id="map-count-badge">Yüklənir...</div>
    </div>
    <div class="map-filters">
      <select id="map-type-filter" style="margin-bottom:8px">
        <option value="all">Bütün elanlar</option>
        <option value="business">Biznes elanları</option>
        <option value="investor">İnvestor elanları</option>
      </select>
      <select id="map-cat-filter">
        <option value="">Bütün kateqoriyalar</option>
      </select>
    </div>
    <div class="map-listing-list" id="map-listing-list"></div>
    <div class="map-legend">
      <span><span class="legend-dot" style="background:#e53e3e"></span>Seçilmiş</span>
      <span><span class="legend-dot" style="background:#3b82f6"></span>Biznes</span>
      <span><span class="legend-dot" style="background:#7c3aed"></span>İnvestor</span>
    </div>
  </div>
</div>

<div id="footer-mount"></div>
<script src="js/app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
if (typeof loadInvestors !== 'function') {
  function loadInvestors() { return loadJSON('data/investors.json'); }
}
</script>
<script>
(async function(){
  mountLayout("listings");

  // City -> approximate coordinates (for investors without lat/lng)
  const CITY_COORDS = {
    "Bakı":     [40.4093, 49.8671],
    "Baki":     [40.4093, 49.8671],
    "Baku":     [40.4093, 49.8671],
    "Sumqayıt": [40.5895, 49.6680],
    "Sumqayit": [40.5895, 49.6680],
    "Gəncə":    [40.6828, 46.3606],
    "Gence":    [40.6828, 46.3606],
    "Ganja":    [40.6828, 46.3606],
    "Mingəçevir":[40.7700, 47.0496],
    "Şirvan":   [39.9292, 48.9206],
    "Naxçıvan": [39.2089, 45.4122],
    "Lənkəran": [38.7530, 48.8475],
    "Şəki":     [41.1919, 47.1706],
    "Quba":     [41.3614, 48.5128],
    "Qəbələ":   [40.9855, 47.8456]
  };
  function jitter(coords, seed) {
    // small deterministic offset so multiple investors in same city don't overlap
    const r = (Math.sin(seed * 9999) + 1) / 2;
    const a = (Math.cos(seed * 7777) + 1) / 2;
    return [coords[0] + (r - 0.5) * 0.04, coords[1] + (a - 0.5) * 0.04];
  }

  const [listings, categories, investors] = await Promise.all([
    loadListings(), loadCategories(), loadInvestors().catch(() => [])
  ]);
  const catById = Object.fromEntries(categories.map(c => [c.id, c]));

  // Init map
  const map = L.map("map", { zoomControl: true }).setView([40.4093, 49.8671], 11);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  const geoListings = listings.filter(l => l.lat && l.lng).map(l => ({ ...l, _kind: "business" }));

  // Build investor points with derived coords
  const geoInvestors = (investors || []).map((inv, idx) => {
    const base = CITY_COORDS[inv.location] || CITY_COORDS["Bakı"];
    const [lat, lng] = jitter(base, idx + 1);
    return { ...inv, lat, lng, _kind: "investor" };
  });

  const allPoints = [...geoListings, ...geoInvestors];

  const markers = [];
  const markerMap = {}; // id -> marker

  // Populate category filter (only business categories)
  const catFilter = document.getElementById("map-cat-filter");
  const typeFilter = document.getElementById("map-type-filter");
  const usedCats = [...new Set(geoListings.map(l => l.category))];
  usedCats.forEach(cid => {
    const cat = catById[cid];
    const opt = document.createElement("option");
    opt.value = cid;
    opt.textContent = catLabel(cat) || cid;
    catFilter.appendChild(opt);
  });

  function fmtBudget(min, max) {
    return fmtAZN(min) + " – " + fmtAZN(max);
  }

  function renderMarkers(subset) {
    markers.forEach(m => map.removeLayer(m));
    markers.length = 0;

    subset.forEach(p => {
      let color, radius;
      if (p._kind === "investor") {
        color = "#7c3aed";
        radius = p.featured ? 11 : 8;
      } else {
        color = p.featured ? "#e53e3e" : "#3b82f6";
        radius = p.featured ? 11 : 8;
      }
      const marker = L.circleMarker([p.lat, p.lng], {
        radius: radius,
        fillColor: color,
        color: "#fff",
        weight: 2,
        opacity: 1,
        fillOpacity: 0.9
      });

      let popupHtml;
      if (p._kind === "investor") {
        const lang = (typeof getLang === "function" ? getLang() : "az");
        const alias = lang === "az" ? p.alias : (p.alias_en || p.alias);
        const intentText = p.transaction_type === "buy"
          ? (lang === "az" ? "Almaq istəyir" : lang === "ru" ? "Хочет купить" : "Looking to buy")
          : (lang === "az" ? "Ortaqlıq axtarır" : lang === "ru" ? "Ищет партнёрство" : "Seeking partnership");
        popupHtml = `
          <div style="min-width:200px">
            <div class="popup-title">💼 ${alias}</div>
            <div style="font-size:12px;color:#64748b;margin-bottom:4px">${intentText} · 📍 ${p.location}</div>
            <div class="popup-price">${fmtBudget(p.budget_min_azn, p.budget_max_azn)}</div>
            <a href="investors.html" class="popup-link" style="background:#7c3aed">İnvestorlara bax →</a>
          </div>`;
      } else {
        const title = locField(p, "title");
        const cat = catById[p.category];
        popupHtml = `
          <div style="min-width:180px">
            <div class="popup-title">${title}</div>
            <div style="font-size:12px;color:#64748b;margin-bottom:4px">${catLabel(cat)} · ${locDistrict(p.district)}, ${locCity(p.city)}</div>
            <div class="popup-price">${fmtAZN(p.price_azn)}</div>
            <a href="listing.html?id=${p.id}" class="popup-link">Elana bax →</a>
          </div>`;
      }
      marker.bindPopup(popupHtml, { maxWidth: 240 });
      marker.addTo(map);
      markers.push(marker);
      markerMap[p._kind + ":" + p.id] = marker;
    });
  }

  function renderList(subset) {
    const list = document.getElementById("map-listing-list");
    document.getElementById("map-count-badge").textContent = subset.length + " elan xəritədə";
    list.innerHTML = subset.map(p => {
      if (p._kind === "investor") {
        const lang = (typeof getLang === "function" ? getLang() : "az");
        const alias = lang === "az" ? p.alias : (p.alias_en || p.alias);
        return `<a class="map-listing-item${p.featured ? " featured" : ""}" data-key="investor:${p.id}" href="investors.html">
          <div class="map-item-icon" style="background:#ede9fe;color:#7c3aed">💼</div>
          <div class="map-item-body">
            <div class="map-item-title">${alias}</div>
            <div class="map-item-loc">📍 ${p.location} · İnvestor</div>
            <div class="map-item-price">${fmtBudget(p.budget_min_azn, p.budget_max_azn)}</div>
          </div>
        </a>`;
      }
      const cat = catById[p.category];
      const icon = CATEGORY_ICONS[p.category] || "🏢";
      const title = locField(p, "title");
      return `<a class="map-listing-item${p.featured ? " featured" : ""}" data-key="business:${p.id}" href="listing.html?id=${p.id}">
        <div class="map-item-icon${p.featured ? " featured" : ""}">${icon}</div>
        <div class="map-item-body">
          <div class="map-item-title">${title}</div>
          <div class="map-item-loc">📍 ${locDistrict(p.district)}, ${locCity(p.city)}</div>
          <div class="map-item-price">${fmtAZN(p.price_azn)}</div>
        </div>
      </a>`;
    }).join("");

    list.querySelectorAll(".map-listing-item").forEach(el => {
      el.addEventListener("click", e => {
        e.preventDefault();
        const m = markerMap[el.dataset.key];
        if (m) {
          map.setView(m.getLatLng(), 14, { animate: true });
          m.openPopup();
        } else {
          window.location.href = el.href;
        }
      });
    });
  }

  function applyFilter() {
    const type = typeFilter.value;
    const cat = catFilter.value;
    let subset = allPoints;
    if (type === "business") subset = subset.filter(p => p._kind === "business");
    else if (type === "investor") subset = subset.filter(p => p._kind === "investor");
    if (cat) subset = subset.filter(p => p._kind === "business" && p.category === cat);
    renderMarkers(subset);
    renderList(subset);
    applyI18n();
  }

  // Disable category filter when investor type is selected (categories don't apply)
  typeFilter.addEventListener("change", () => {
    catFilter.disabled = (typeFilter.value === "investor");
    if (catFilter.disabled) catFilter.value = "";
    applyFilter();
  });
  catFilter.addEventListener("change", applyFilter);
  applyFilter();

  window.addEventListener("langchange", () => location.reload());
})();
</script>
</body>
</html>
