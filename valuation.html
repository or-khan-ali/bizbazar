<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Peşəkar Biznes Qiymətləndirməsi — BizBazar.az</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <meta name="description" content="Peşəkar biznes qiymətləndirmə modeli. SDE multiple, gəlir multiple və aktiv əsaslı metodları birləşdirən, 15+ keyfiyyət faktorunu nəzərə alan dəqiq valuasiya kalkulyatoru.">
  <meta name="keywords" content="biznes qiymətləndirmə, biznes valuasiya, SDE multiple, EBITDA, biznes dəyəri, peşəkar qiymətləndirmə">
  <meta name="author" content="BizBazar.az">
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Peşəkar Biznes Qiymətləndirməsi — BizBazar.az">
  <meta property="og:description" content="SDE multiple, gəlir və aktiv əsaslı metodları birləşdirən professional valuasiya modeli.">
  <meta property="og:url" content="https://bizbazar.az/valuation.html">
  <meta property="og:image" content="https://bizbazar.az/favicon.svg">
  <meta property="og:site_name" content="BizBazar.az">
  <meta property="og:locale" content="az_AZ">

  <meta name="twitter:card" content="summary_large_image">

  <link rel="canonical" href="https://bizbazar.az/valuation.html">

  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ==== HERO ==== */
    .val-hero {
      background:
        radial-gradient(circle at 20% 0%, rgba(99,102,241,.14) 0%, transparent 50%),
        radial-gradient(circle at 80% 100%, rgba(168,85,247,.10) 0%, transparent 50%),
        linear-gradient(180deg, #f5f3ff 0%, #ffffff 100%);
      padding: 60px 0 36px;
    }
    .val-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(99,102,241,.10); color: #4f46e5;
      padding: 6px 14px; border-radius: 999px;
      font-size: 13px; font-weight: 600; margin-bottom: 14px;
    }
    .val-hero h1 {
      font-size: 38px; font-weight: 800; margin: 0 0 12px;
      letter-spacing: -.02em; line-height: 1.15; max-width: 720px;
    }
    .val-hero p { font-size: 16px; color: var(--text-muted); max-width: 680px; line-height: 1.55; margin: 0; }
    .val-method-tags {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: 22px;
    }
    .val-method-tag {
      background: white; border: 1px solid var(--border);
      padding: 6px 12px; border-radius: 999px; font-size: 12px;
      font-weight: 600; color: var(--text);
    }
    .val-method-tag .dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; margin-right: 6px; vertical-align: middle;
    }

    /* ==== PROGRESS ==== */
    .val-progress {
      display: flex; max-width: 820px; margin: 0 auto 28px;
      gap: 10px;
    }
    .val-progress-step {
      flex: 1; padding: 14px 12px; background: white;
      border: 1.5px solid var(--border); border-radius: 12px;
      text-align: center; font-size: 13px; font-weight: 600;
      color: var(--text-muted); transition: all .2s ease;
    }
    .val-progress-step.active {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white; border-color: #4f46e5;
      box-shadow: 0 4px 12px rgba(99,102,241,.30);
    }
    .val-progress-step.done { background: #ede9fe; color: #5b21b6; border-color: #c4b5fd; }
    .val-progress-step .num {
      display: inline-block; width: 22px; height: 22px;
      border-radius: 50%; background: rgba(255,255,255,.20);
      line-height: 22px; font-size: 12px; margin-right: 6px;
    }
    .val-progress-step:not(.active):not(.done) .num { background: #f1f5f9; color: var(--text-muted); }

    /* ==== FORM ==== */
    .val-form-wrap {
      max-width: 820px; margin: 0 auto;
      background: white; border-radius: 18px; padding: 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,.04);
      border: 1px solid var(--border);
    }
    .val-step { display: none; }
    .val-step.active { display: block; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .val-step h2 { font-size: 22px; font-weight: 700; margin: 0 0 6px; letter-spacing: -.01em; }
    .val-step .step-sub { color: var(--text-muted); font-size: 14px; margin: 0 0 24px; line-height: 1.5; }

    .val-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .val-field { margin-bottom: 16px; }
    .val-field label {
      display: block; font-weight: 600; font-size: 13px;
      color: var(--text); margin-bottom: 6px;
    }
    .val-field .help { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .val-field input, .val-field select {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; box-sizing: border-box; background: #fafafa;
      transition: all .15s ease;
    }
    .val-field input:focus, .val-field select:focus {
      outline: none; border-color: #6366f1; background: white;
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
    }

    .val-radio-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; }
    .val-radio-card {
      display: block; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; background: #fafafa;
      transition: all .15s ease;
    }
    .val-radio-card input { display: none; }
    .val-radio-card .title { font-weight: 600; font-size: 13px; margin-bottom: 2px; color: var(--text); }
    .val-radio-card .desc { font-size: 11px; color: var(--text-muted); line-height: 1.35; }
    .val-radio-card:hover { border-color: #a5b4fc; background: white; }
    .val-radio-card.selected {
      background: #ede9fe; border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.10);
    }
    .val-radio-card.selected .title { color: #4f46e5; }

    .val-step-nav {
      display: flex; justify-content: space-between; gap: 12px;
      margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border);
    }
    .val-step-nav button {
      padding: 12px 26px; border-radius: 10px; font-weight: 600;
      font-size: 14px; cursor: pointer; border: none;
      transition: all .15s ease;
    }
    .val-btn-back {
      background: white; border: 1.5px solid var(--border); color: var(--text);
    }
    .val-btn-back:hover { background: #f8fafc; }
    .val-btn-next {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white; box-shadow: 0 4px 12px rgba(99,102,241,.30);
    }
    .val-btn-next:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(99,102,241,.40); }

    /* ==== RESULT ==== */
    .val-result-section { display: none; max-width: 920px; margin: 36px auto 0; }
    .val-result-hero {
      background:
        radial-gradient(circle at 0% 0%, rgba(255,255,255,.10) 0%, transparent 50%),
        linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 20px; padding: 40px;
      color: white; margin-bottom: 22px;
      position: relative; overflow: hidden;
    }
    .val-result-hero::after {
      content: ""; position: absolute; top: -100px; right: -80px;
      width: 280px; height: 280px;
      background: rgba(255,255,255,.06); border-radius: 50%;
    }
    .val-result-eyebrow {
      font-size: 12px; opacity: .85; margin-bottom: 8px;
      letter-spacing: 1px; text-transform: uppercase; font-weight: 600;
      position: relative;
    }
    .val-result-range {
      font-size: 42px; font-weight: 800;
      letter-spacing: -.025em; margin: 0 0 6px; line-height: 1.05;
      position: relative;
    }
    .val-result-mid { font-size: 15px; opacity: .92; position: relative; }
    .val-result-mid strong { font-weight: 700; }

    .val-methods {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; margin-bottom: 22px;
    }
    .val-method-card {
      background: white; border: 1px solid var(--border);
      border-radius: 14px; padding: 20px;
    }
    .val-method-card .label {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .5px;
      font-weight: 600; margin-bottom: 6px;
    }
    .val-method-card .value {
      font-size: 22px; font-weight: 800; color: var(--text);
      letter-spacing: -.02em; margin-bottom: 4px;
    }
    .val-method-card .formula { font-size: 11px; color: var(--text-muted); }
    .val-method-card.primary { border: 2px solid #6366f1; background: linear-gradient(180deg, #fafaff 0%, #ffffff 60%); }
    .val-method-card.primary .label { color: #4f46e5; }

    .val-breakdown {
      background: white; border: 1px solid var(--border);
      border-radius: 14px; padding: 26px; margin-bottom: 22px;
    }
    .val-breakdown h3 { margin: 0 0 16px; font-size: 17px; font-weight: 700; }
    .val-adj-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px dashed var(--border); font-size: 14px;
    }
    .val-adj-row:last-child { border-bottom: none; }
    .val-adj-label { color: var(--text-muted); }
    .val-adj-value { font-weight: 600; font-variant-numeric: tabular-nums; }
    .val-adj-value.pos { color: #059669; }
    .val-adj-value.neg { color: #dc2626; }
    .val-adj-value.neutral { color: var(--text-muted); }

    .val-insights {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin-bottom: 22px;
    }
    .val-insight-card {
      background: white; border: 1px solid var(--border);
      border-radius: 14px; padding: 22px;
    }
    .val-insight-card.strengths { border-left: 4px solid #10b981; }
    .val-insight-card.risks { border-left: 4px solid #f59e0b; }
    .val-insight-card h4 {
      margin: 0 0 12px; font-size: 15px; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
    }
    .val-insight-card ul { margin: 0; padding-left: 20px; font-size: 13px; color: var(--text); line-height: 1.6; }
    .val-insight-card li { margin-bottom: 6px; }

    .val-cta-pro {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-radius: 16px; padding: 32px; color: white; text-align: center;
    }
    .val-cta-pro h3 { margin: 0 0 8px; font-size: 19px; font-weight: 700; }
    .val-cta-pro p { margin: 0 0 18px; opacity: .80; font-size: 14px; line-height: 1.5; }
    .val-cta-pro a {
      background: white; color: #0f172a;
      padding: 12px 28px; border-radius: 10px;
      font-weight: 700; text-decoration: none; display: inline-block;
    }
    .val-cta-pro a:hover { transform: translateY(-1px); }

    .val-disclaimer {
      max-width: 920px; margin: 18px auto 0;
      font-size: 12px; color: var(--text-muted);
      text-align: center; line-height: 1.5;
    }

    @media (max-width: 768px) {
      .val-hero h1 { font-size: 28px; }
      .val-grid-2 { grid-template-columns: 1fr; }
      .val-form-wrap { padding: 22px; }
      .val-progress { flex-direction: column; gap: 6px; }
      .val-progress-step { text-align: left; }
      .val-result-range { font-size: 32px; }
      .val-methods { grid-template-columns: 1fr; }
      .val-insights { grid-template-columns: 1fr; }
      .val-result-hero { padding: 28px; }
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <script>(function(){if(localStorage.getItem('bb_darkmode')==='1')document.documentElement.setAttribute('data-theme','dark')})()</script>

<body>
<div id="header-mount"></div>

<!-- HERO -->
<section class="val-hero">
  <div class="container">
    <span class="val-eyebrow" id="vp-eyebrow"></span>
    <h1 id="vp-h1"></h1>
    <p id="vp-lead"></p>
    <div class="val-method-tags">
      <span class="val-method-tag"><span class="dot" style="background:#6366f1"></span><span id="vp-tag-sde"></span></span>
      <span class="val-method-tag"><span class="dot" style="background:#10b981"></span><span id="vp-tag-rev"></span></span>
      <span class="val-method-tag"><span class="dot" style="background:#f59e0b"></span><span id="vp-tag-asset"></span></span>
    </div>
  </div>
</section>

<section style="padding: 36px 0 60px;">
  <div class="container">
    <div class="val-progress">
      <div class="val-progress-step active" data-prog="1"><span class="num">1</span><span id="vp-prog-1"></span></div>
      <div class="val-progress-step" data-prog="2"><span class="num">2</span><span id="vp-prog-2"></span></div>
      <div class="val-progress-step" data-prog="3"><span class="num">3</span><span id="vp-prog-3"></span></div>
      <div class="val-progress-step" data-prog="4"><span class="num">4</span><span id="vp-prog-4"></span></div>
    </div>

    <div class="val-form-wrap" id="val-form">
      <!-- STEP 1: Business basics -->
      <div class="val-step active" data-step="1">
        <h2 id="vp-s1-h2"></h2>
        <p class="step-sub" id="vp-s1-sub"></p>

        <div class="val-grid-2">
          <div class="val-field">
            <label id="vp-lbl-cat"></label>
            <select id="i-category">
              <option value="" id="vp-opt-pick"></option>
            </select>
          </div>
          <div class="val-field">
            <label id="vp-lbl-loc"></label>
            <select id="i-location">
              <option value="prime" id="vp-loc-prime"></option>
              <option value="good" selected id="vp-loc-good"></option>
              <option value="average" id="vp-loc-avg"></option>
              <option value="poor" id="vp-loc-poor"></option>
            </select>
          </div>
        </div>

        <div class="val-grid-2">
          <div class="val-field">
            <label id="vp-lbl-years"></label>
            <input type="number" id="i-years" min="0" max="50" step="1">
            <div class="help" id="vp-help-years"></div>
          </div>
          <div class="val-field">
            <label id="vp-lbl-customers"></label>
            <input type="number" id="i-customers" min="0" step="10">
            <div class="help" id="vp-help-customers"></div>
          </div>
        </div>

        <div class="val-step-nav">
          <span></span>
          <button class="val-btn-next vp-next-btn" data-go="2"></button>
        </div>
      </div>

      <!-- STEP 2: Financials -->
      <div class="val-step" data-step="2">
        <h2 id="vp-s2-h2"></h2>
        <p class="step-sub" id="vp-s2-sub"></p>

        <div class="val-grid-2">
          <div class="val-field">
            <label id="vp-lbl-revenue"></label>
            <input type="number" id="i-revenue" min="0" step="1000">
            <div class="help" id="vp-help-revenue"></div>
          </div>
          <div class="val-field">
            <label id="vp-lbl-profit"></label>
            <input type="number" id="i-profit" min="0" step="500">
            <div class="help" id="vp-help-profit"></div>
          </div>
        </div>

        <div class="val-grid-2">
          <div class="val-field">
            <label id="vp-lbl-owner-salary"></label>
            <input type="number" id="i-owner-salary" min="0" step="500">
            <div class="help" id="vp-help-owner-salary"></div>
          </div>
          <div class="val-field">
            <label id="vp-lbl-addbacks"></label>
            <input type="number" id="i-addbacks" min="0" step="500">
            <div class="help" id="vp-help-addbacks"></div>
          </div>
        </div>

        <div class="val-grid-2">
          <div class="val-field">
            <label id="vp-lbl-growth"></label>
            <input type="number" id="i-growth" min="-100" max="500" step="1">
            <div class="help" id="vp-help-growth"></div>
          </div>
          <div class="val-field">
            <label id="vp-lbl-recurring"></label>
            <input type="number" id="i-recurring" min="0" max="100" step="5">
            <div class="help" id="vp-help-recurring"></div>
          </div>
        </div>

        <div class="val-step-nav">
          <button class="val-btn-back vp-back-btn" data-go="1"></button>
          <button class="val-btn-next vp-next-btn" data-go="3"></button>
        </div>
      </div>

      <!-- STEP 3: Assets -->
      <div class="val-step" data-step="3">
        <h2 id="vp-s3-h2"></h2>
        <p class="step-sub" id="vp-s3-sub"></p>

        <div class="val-grid-2">
          <div class="val-field">
            <label id="vp-lbl-equipment"></label>
            <input type="number" id="i-equipment" min="0" step="1000">
            <div class="help" id="vp-help-equipment"></div>
          </div>
          <div class="val-field">
            <label id="vp-lbl-inventory"></label>
            <input type="number" id="i-inventory" min="0" step="500">
            <div class="help" id="vp-help-inventory"></div>
          </div>
        </div>

        <div class="val-grid-2">
          <div class="val-field">
            <label id="vp-lbl-real-estate"></label>
            <select id="i-real-estate">
              <option value="rent" selected id="vp-re-rent"></option>
              <option value="own" id="vp-re-own"></option>
              <option value="own-included" id="vp-re-own-inc"></option>
            </select>
          </div>
          <div class="val-field" id="rent-field">
            <label id="vp-lbl-rent"></label>
            <input type="number" id="i-rent" min="0" step="100">
            <div class="help" id="vp-help-rent"></div>
          </div>
        </div>

        <div class="val-grid-2" id="lease-grid">
          <div class="val-field">
            <label id="vp-lbl-lease-years"></label>
            <input type="number" id="i-lease-years" min="0" max="20" step="1">
            <div class="help" id="vp-help-lease-years"></div>
          </div>
          <div class="val-field">
            <label id="vp-lbl-property-value"></label>
            <input type="number" id="i-property-value" min="0" step="1000">
            <div class="help" id="vp-help-property-value"></div>
          </div>
        </div>

        <div class="val-grid-2">
          <div class="val-field">
            <label id="vp-lbl-staff"></label>
            <input type="number" id="i-staff" min="0" step="1">
          </div>
          <div class="val-field">
            <label id="vp-lbl-license"></label>
            <select id="i-license">
              <option value="full" selected id="vp-lic-full"></option>
              <option value="partial" id="vp-lic-partial"></option>
              <option value="none" id="vp-lic-none"></option>
              <option value="not-required" id="vp-lic-nr"></option>
            </select>
          </div>
        </div>

        <div class="val-step-nav">
          <button class="val-btn-back vp-back-btn" data-go="2"></button>
          <button class="val-btn-next vp-next-btn" data-go="4"></button>
        </div>
      </div>

      <!-- STEP 4: Quality factors -->
      <div class="val-step" data-step="4">
        <h2 id="vp-s4-h2"></h2>
        <p class="step-sub" id="vp-s4-sub"></p>

        <div class="val-field">
          <label id="vp-lbl-concentration"></label>
          <div class="val-radio-group">
            <label class="val-radio-card selected"><input type="radio" name="concentration" value="low" checked>
              <div class="title" id="vp-con-low-t"></div><div class="desc" id="vp-con-low-d"></div></label>
            <label class="val-radio-card"><input type="radio" name="concentration" value="medium">
              <div class="title" id="vp-con-med-t"></div><div class="desc" id="vp-con-med-d"></div></label>
            <label class="val-radio-card"><input type="radio" name="concentration" value="high">
              <div class="title" id="vp-con-high-t"></div><div class="desc" id="vp-con-high-d"></div></label>
          </div>
        </div>

        <div class="val-field">
          <label id="vp-lbl-owner-dep"></label>
          <div class="val-radio-group">
            <label class="val-radio-card"><input type="radio" name="owner-dep" value="low">
              <div class="title" id="vp-od-low-t"></div><div class="desc" id="vp-od-low-d"></div></label>
            <label class="val-radio-card selected"><input type="radio" name="owner-dep" value="medium" checked>
              <div class="title" id="vp-od-med-t"></div><div class="desc" id="vp-od-med-d"></div></label>
            <label class="val-radio-card"><input type="radio" name="owner-dep" value="high">
              <div class="title" id="vp-od-high-t"></div><div class="desc" id="vp-od-high-d"></div></label>
          </div>
        </div>

        <div class="val-field">
          <label id="vp-lbl-docs"></label>
          <div class="val-radio-group">
            <label class="val-radio-card"><input type="radio" name="docs" value="audit">
              <div class="title" id="vp-dc-audit-t"></div><div class="desc" id="vp-dc-audit-d"></div></label>
            <label class="val-radio-card selected"><input type="radio" name="docs" value="accounting" checked>
              <div class="title" id="vp-dc-acc-t"></div><div class="desc" id="vp-dc-acc-d"></div></label>
            <label class="val-radio-card"><input type="radio" name="docs" value="basic">
              <div class="title" id="vp-dc-basic-t"></div><div class="desc" id="vp-dc-basic-d"></div></label>
            <label class="val-radio-card"><input type="radio" name="docs" value="none">
              <div class="title" id="vp-dc-none-t"></div><div class="desc" id="vp-dc-none-d"></div></label>
          </div>
        </div>

        <div class="val-field">
          <label id="vp-lbl-brand"></label>
          <div class="val-radio-group">
            <label class="val-radio-card"><input type="radio" name="brand" value="strong">
              <div class="title" id="vp-br-strong-t"></div><div class="desc" id="vp-br-strong-d"></div></label>
            <label class="val-radio-card selected"><input type="radio" name="brand" value="moderate" checked>
              <div class="title" id="vp-br-mod-t"></div><div class="desc" id="vp-br-mod-d"></div></label>
            <label class="val-radio-card"><input type="radio" name="brand" value="weak">

    // defaults for method detail spans (overwritten on calc)
    const sdeDet = document.getElementById("r-sde-detail");
    if (sdeDet && !sdeDet.dataset.computed) sdeDet.textContent = c.m1_default;
    const revDet = document.getElementById("r-rev-detail");
    if (revDet && !revDet.dataset.computed) revDet.textContent = c.m2_default;
    document.getElementById("vp-breakdown-h3").textContent = c.breakdown_h3;
    document.getElementById("vp-strengths-h4").textContent = c.strengths_h4;
    document.getElementById("vp-risks-h4").textContent = c.risks_h4;
    document.getElementById("vp-cta-h3").textContent = c.cta_h3;
    document.getElementById("vp-cta-p").textContent = c.cta_p;
    document.getElementById("vp-cta-a").textContent = c.cta_a;
    document.getElementById("vp-disclaimer").textContent = c.disclaimer;
  }
  applyValCopy();

  const [categories, benchmarksData] = await Promise.all([
    loadCategories(),
    loadJSON("data/benchmarks.json")
  ]);
  const benchmarks = benchmarksData.by_category;
  const benchmarkByCategory = Object.fromEntries(benchmarks.map(b => [b.id, b]));

  const catSelect = document.getElementById("i-category");
  categories.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.id;
    opt.textContent = catLabel(c);
    catSelect.appendChild(opt);
  });

  // Step navigation
  function goStep(n) {
    document.querySelectorAll(".val-step").forEach(s => s.classList.toggle("active", s.dataset.step == n));
    document.querySelectorAll(".val-progress-step").forEach(p => {
      const k = parseInt(p.dataset.prog);
      p.classList.toggle("active", k == n);
      p.classList.toggle("done", k < n);
    });
    document.getElementById("val-form").scrollIntoView({ behavior: "smooth", block: "start" });
  }

  document.querySelectorAll("[data-go]").forEach(btn => {
    btn.addEventListener("click", () => {
      const go = btn.dataset.go;
      if (go) goStep(parseInt(go));
    });
  });

  // Radio cards
  document.querySelectorAll(".val-radio-card").forEach(card => {
    card.addEventListener("click", () => {
      const input = card.querySelector("input");
      const name = input.name;
      document.querySelectorAll(`.val-radio-card`).forEach(c => {
        if (c.querySelector("input").name === name) c.classList.remove("selected");
      });
      card.classList.add("selected");
      input.checked = true;
    });
  });

  // Real estate field toggle
  const reSelect = document.getElementById("i-real-estate");
  function updateRealEstateFields() {
    const v = reSelect.value;
    document.getElementById("rent-field").style.display = (v === "rent") ? "" : "none";
  }
  reSelect.addEventListener("change", updateRealEstateFields);
  updateRealEstateFields();

  // Calculate
  document.getElementById("val-calculate").addEventListener("click", () => {
    const data = collectInputs();
    if (!validateInputs(data)) return;
    const result = computeValuation(data);
    renderResult(data, result);
  });

  function collectInputs() {
    const num = id => parseFloat(document.getElementById(id).value) || 0;
    const radio = name => {
      const el = document.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    };
    return {
      category: document.getElementById("i-category").value,
      location: document.getElementById("i-location").value,
      years: num("i-years"),
      customers: num("i-customers"),
      revenue: num("i-revenue"),
      profit: num("i-profit"),
      ownerSalary: num("i-owner-salary"),
      addbacks: num("i-addbacks"),
      growth: num("i-growth"),
      recurring: num("i-recurring"),
      equipment: num("i-equipment"),
      inventory: num("i-inventory"),
      realEstate: document.getElementById("i-real-estate").value,
      rent: num("i-rent"),
      leaseYears: num("i-lease-years"),
      propertyValue: num("i-property-value"),
      staff: num("i-staff"),
      license: document.getElementById("i-license").value,
      concentration: radio("concentration"),
      ownerDep: radio("owner-dep"),
      docs: radio("docs"),
      brand: radio("brand"),
      staffStability: radio("staff-stability")
    };
  }

  function validateInputs(d) {
    const c = tx();
    if (!d.category) { alert(c.v_cat); goStep(1); return false; }
    if (d.profit <= 0) { alert(c.v_profit); goStep(2); return false; }
    if (d.revenue <= 0) { alert(c.v_revenue); goStep(2); return false; }
    if (d.profit > d.revenue) { alert(c.v_margin); goStep(2); return false; }
    return true;
  }

  function computeValuation(d) {
    const c = tx();
    const bench = benchmarkByCategory[d.category];
    // Benchmark avg_multiple is monthly profit multiple (price / monthly_profit).
    // Convert to annual SDE multiple.
    const baseMultipleAnnual = (bench ? bench.avg_multiple : 12) / 12;

    // SDE = annual profit + owner salary add-back + non-recurring add-backs
    const sde = d.profit + d.ownerSalary + d.addbacks;

    // Adjustments (each as fractional change to multiple)
    const adj = [];

    // 1) Operating history
    let v;
    if (d.years < 2) v = -0.20;
    else if (d.years < 5) v = 0;
    else if (d.years < 10) v = 0.10;
    else v = 0.15;
    adj.push({ label: c.adj_op_years(Math.round(d.years)), value: v });

    // 2) Growth
    if (d.growth < -10) v = -0.25;
    else if (d.growth < 0) v = -0.15;
    else if (d.growth < 5) v = 0;
    else if (d.growth < 15) v = 0.10;
    else if (d.growth < 30) v = 0.20;
    else v = 0.30;
    adj.push({ label: c.adj_growth(Math.round(d.growth)), value: v });

    // 3) Recurring revenue
    if (d.recurring >= 50) v = 0.15;
    else if (d.recurring >= 30) v = 0.10;
    else if (d.recurring >= 15) v = 0.05;
    else v = 0;
    adj.push({ label: c.adj_recurring(Math.round(d.recurring)), value: v });

    // 4) Customer concentration
    const concMap = { low: 0, medium: -0.05, high: -0.15 };
    adj.push({ label: c.adj_concentration, value: concMap[d.concentration] || 0 });

    // 5) Owner dependence
    const ownerMap = { low: 0.10, medium: 0, high: -0.15 };
    adj.push({ label: c.adj_owner_dep, value: ownerMap[d.ownerDep] || 0 });

    // 6) Documentation
    const docsMap = { audit: 0.10, accounting: 0, basic: -0.10, none: -0.20 };
    adj.push({ label: c.adj_docs, value: docsMap[d.docs] || 0 });

    // 7) Brand & online presence
    const brandMap = { strong: 0.10, moderate: 0, weak: -0.10 };
    adj.push({ label: c.adj_brand, value: brandMap[d.brand] || 0 });

    // 8) Staff stability
    const staffMap = { high: 0.05, medium: 0, low: -0.10 };
    adj.push({ label: c.adj_staff, value: staffMap[d.staffStability] || 0 });

    // 9) Location
    const locMap = { prime: 0.10, good: 0, average: -0.05, poor: -0.15 };
    adj.push({ label: c.adj_location, value: locMap[d.location] || 0 });

    // 10) Lease (only if renting)
    let leaseAdj = 0;
    if (d.realEstate === "rent") {
      if (d.leaseYears < 2) leaseAdj = -0.10;
      else if (d.leaseYears >= 5) leaseAdj = 0.05;
      adj.push({ label: c.adj_lease(Math.round(d.leaseYears)), value: leaseAdj });
    }

    // 11) License status
    const licMap = { full: 0, "not-required": 0, partial: -0.05, none: -0.15 };
    adj.push({ label: c.adj_license, value: licMap[d.license] || 0 });

    // 12) Profit margin vs industry
    const myMargin = d.profit / d.revenue;
    const industryMargin = bench ? (bench.avg_profit_azn / bench.avg_revenue_azn) : 0.25;
    let marginAdj = 0;
    if (myMargin > industryMargin * 1.3) marginAdj = 0.10;
    else if (myMargin > industryMargin * 1.1) marginAdj = 0.05;
    else if (myMargin < industryMargin * 0.7) marginAdj = -0.10;
    adj.push({ label: c.adj_margin((myMargin*100).toFixed(1), (industryMargin*100).toFixed(0)), value: marginAdj });

    // Cap total adjustment to ±50%
    let totalAdj = adj.reduce((s, a) => s + a.value, 0);
    totalAdj = Math.max(-0.50, Math.min(0.50, totalAdj));
    const adjustedMultiple = baseMultipleAnnual * (1 + totalAdj);

    // Method 1: SDE-based valuation
    const sdeValuation = sde * adjustedMultiple;

    // Method 2: Revenue multiple
    // Base revenue multiple varies by industry. Use industry margin to derive.
    let revMultiple = 0.4 + Math.min(0.8, industryMargin * 2.5);
    revMultiple *= (1 + totalAdj * 0.6); // less sensitive than SDE
    const revValuation = d.revenue * revMultiple;

    // Method 3: Asset floor (equipment + inventory + included property)
    const includedProperty = (d.realEstate === "own-included") ? d.propertyValue : 0;
    const assetFloor = d.equipment + d.inventory + includedProperty;

    // Weighted recommendation
    // 65% SDE, 25% revenue, 10% asset; never below 110% of asset floor
    const weighted = sdeValuation * 0.65 + revValuation * 0.25 + assetFloor * 0.10;
    const recommended = Math.max(weighted, assetFloor * 1.1);

    const low = Math.round(recommended * 0.85);
    const high = Math.round(recommended * 1.18);
    const mid = Math.round(recommended);

    return {
      sde, baseMultipleAnnual, adjustedMultiple,
      sdeValuation: Math.round(sdeValuation),
      revValuation: Math.round(revValuation),
      assetFloor: Math.round(assetFloor),
      revMultiple,
      low, high, mid,
      adjustments: adj,
      totalAdj,
      industryMargin
    };
  }

  // Hold last-computed values so we can re-render result block on language switch
  let lastData = null, lastResult = null;

  function renderResult(d, r) {
    lastData = d; lastResult = r;
    const c = tx();
    document.getElementById("r-range").textContent = fmtAZN(r.low) + " – " + fmtAZN(r.high);
    document.getElementById("r-mid").textContent = fmtAZN(r.mid);
    document.getElementById("r-method-sde").textContent = fmtAZN(r.sdeValuation);
    const sdeDet = document.getElementById("r-sde-detail");
    sdeDet.textContent = `${fmtAZN(r.sde)} SDE × ${r.adjustedMultiple.toFixed(2)}`;
    sdeDet.dataset.computed = "1";
    document.getElementById("r-method-rev").textContent = fmtAZN(r.revValuation);
    const revDet = document.getElementById("r-rev-detail");
    revDet.textContent = `${fmtAZN(d.revenue)} × ${r.revMultiple.toFixed(2)}`;
    revDet.dataset.computed = "1";
    document.getElementById("r-method-asset").textContent = fmtAZN(r.assetFloor);

    // Breakdown
    const bd = document.getElementById("r-breakdown");
    let html = `
      <div class="val-adj-row">
        <span class="val-adj-label">${c.sde_row}</span>
        <span class="val-adj-value">${fmtAZN(r.sde)}</span>
      </div>
      <div class="val-adj-row">
        <span class="val-adj-label">${c.industry_base(d.category)}</span>
        <span class="val-adj-value">${r.baseMultipleAnnual.toFixed(2)}× SDE</span>
      </div>
      <div class="val-adj-row" style="background:#f8fafc;margin:8px -10px;padding:8px 10px;border-radius:6px;border:none">
        <span class="val-adj-label" style="font-weight:700;color:var(--text);font-size:13px">${c.adj_factors_title}</span>
        <span></span>
      </div>
    `;
    r.adjustments.forEach(a => {
      const pct = (a.value * 100).toFixed(0);
      const cls = a.value > 0 ? "pos" : a.value < 0 ? "neg" : "neutral";
      const sign = a.value > 0 ? "+" : "";
      html += `<div class="val-adj-row">
        <span class="val-adj-label">${a.label}</span>
        <span class="val-adj-value ${cls}">${sign}${pct}%</span>
      </div>`;
    });
    const totalCls = r.totalAdj > 0 ? "pos" : r.totalAdj < 0 ? "neg" : "neutral";
    const totalSign = r.totalAdj > 0 ? "+" : "";
    html += `<div class="val-adj-row" style="border-top:2px solid var(--border);padding-top:14px;margin-top:8px">
      <span class="val-adj-label" style="font-weight:700;color:var(--text)">${c.total_adj}</span>
      <span class="val-adj-value ${totalCls}">${totalSign}${(r.totalAdj*100).toFixed(0)}%</span>
    </div>
    <div class="val-adj-row">
      <span class="val-adj-label" style="font-weight:700;color:var(--text)">${c.adjusted_mult}</span>
      <span class="val-adj-value">${r.adjustedMultiple.toFixed(2)}× SDE</span>
    </div>
    <div class="val-adj-row" style="background:#ede9fe;margin:8px -10px;padding:12px 10px;border-radius:6px;border:none">
      <span class="val-adj-label" style="font-weight:700;color:#4f46e5;font-size:14px">${c.weighted_rec}</span>
      <span class="val-adj-value" style="color:#4f46e5;font-size:15px">${fmtAZN(r.mid)}</span>
    </div>`;
    bd.innerHTML = html;

    // Strengths & risks
    const strengths = [], risks = [];
    if (d.years >= 5) strengths.push(c.str_years(Math.round(d.years)));
    else if (d.years < 2) risks.push(c.rsk_new);

    if (d.growth >= 15) strengths.push(c.str_growth(Math.round(d.growth)));
    else if (d.growth < 0) risks.push(c.rsk_growth(Math.round(d.growth)));

    const myMargin = d.profit / d.revenue;
    if (myMargin > r.industryMargin * 1.2) strengths.push(c.str_margin((myMargin*100).toFixed(0)));
    else if (myMargin < r.industryMargin * 0.7) risks.push(c.rsk_margin((myMargin*100).toFixed(0)));

    if (d.recurring >= 30) strengths.push(c.str_recurring(Math.round(d.recurring)));

    if (d.concentration === "low") strengths.push(c.str_conc_low);
    else if (d.concentration === "high") risks.push(c.rsk_conc_high);

    if (d.ownerDep === "low") strengths.push(c.str_owner_low);
    else if (d.ownerDep === "high") risks.push(c.rsk_owner_high);

    if (d.docs === "audit") strengths.push(c.str_docs_audit);
    else if (d.docs === "none") risks.push(c.rsk_docs_none);

    if (d.brand === "strong") strengths.push(c.str_brand_strong);
    else if (d.brand === "weak") risks.push(c.rsk_brand_weak);

    if (d.location === "prime") strengths.push(c.str_loc_prime);
    else if (d.location === "poor") risks.push(c.rsk_loc_poor);

    if (d.realEstate === "rent" && d.leaseYears < 2) risks.push(c.rsk_lease_short);
    if (d.realEstate === "own-included") strengths.push(c.str_re_inc);

    if (d.staffStability === "low") risks.push(c.rsk_staff_low);
    else if (d.staffStability === "high") strengths.push(c.str_staff_high);

    if (d.license === "none") risks.push(c.rsk_license_none);

    if (r.assetFloor > r.sdeValuation * 1.5) {
      strengths.push(c.str_assets_high);
    }

    if (strengths.length === 0) strengths.push(c.str_empty);
    if (risks.length === 0) risks.push(c.rsk_empty);

    document.getElementById("r-strengths").innerHTML = strengths.map(s => `<li>${s}</li>`).join("");
    document.getElementById("r-risks").innerHTML = risks.map(s => `<li>${s}</li>`).join("");

    document.getElementById("val-result").style.display = "block";
    document.getElementById("val-result").scrollIntoView({ behavior: "smooth", block: "start" });
  }

  applyI18n();
  window.addEventListener("langchange", () => {
    applyValCopy();
    // Re-translate category dropdown (uses catLabel which depends on lang)
    [...catSelect.options].forEach((opt, i) => {
      if (i === 0) return;
      const cat = categories.find(c => c.id === opt.value);
      if (cat) opt.textContent = catLabel(cat);
    });
    // If we have a previously computed result, re-render it in the new language
    if (lastData && lastResult) {
      const fresh = computeValuation(lastData);
      renderResult(lastData, fresh);
    }
  });
})();
</script>
</body>
</html>
