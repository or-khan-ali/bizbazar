<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Büdcəmə uyğun biznes — BizBazar.az</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- SEO -->
  <meta name="description" content="Büdcənizi daxil edin və satın ala biləcəyiniz bizneslərlə tanış olun. Aylıq gəlir proqnozları və ROI hesablamaları.">
  <meta name="keywords" content="büdcə biznes, biznes axtarış, biznes ROI">
  <meta name="author" content="BizBazar.az">
  <meta name="robots" content="index, follow">

  <!-- Open Graph (for social sharing) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Büdcəmə uyğun biznes — BizBazar.az">
  <meta property="og:description" content="Büdcənizi daxil edin və satın ala biləcəyiniz bizneslərlə tanış olun. Aylıq gəlir proqnozları və ROI hesablamaları.">
  <meta property="og:url" content="https://bizbazar.az/afford.html">
  <meta property="og:image" content="https://bizbazar.az/favicon.svg">
  <meta property="og:site_name" content="BizBazar.az">
  <meta property="og:locale" content="az_AZ">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Büdcəmə uyğun biznes — BizBazar.az">
  <meta name="twitter:description" content="Büdcənizi daxil edin və satın ala biləcəyiniz bizneslərlə tanış olun. Aylıq gəlir proqnozları və ROI hesablamaları.">
  <meta name="twitter:image" content="https://bizbazar.az/favicon.svg">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://bizbazar.az/afford.html">

  <link rel="stylesheet" href="css/styles.css">
  <style>
    .afford-form { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 2px 16px rgba(0,0,0,.08); margin-bottom: 36px; }
    .afford-form .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 16px; align-items: flex-end; }
    @media(max-width:700px) { .afford-form .form-row { grid-template-columns: 1fr; } }
    .afford-form .form-group { display: flex; flex-direction: column; gap: 6px; }
    .afford-form label { font-weight: 600; font-size: 14px; color: #374151; }
    .afford-form input, .afford-form select { padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 15px; }
    .afford-form input:focus, .afford-form select:focus { outline: none; border-color: var(--primary); }
    .afford-summary { background: linear-gradient(90deg, #1e3a5f, #2563eb); color: #fff; border-radius: 12px; padding: 20px 28px; margin-bottom: 28px; display: flex; gap: 40px; align-items: center; flex-wrap: wrap; }
    .afford-summary .s-item .s-lbl { font-size: 12px; opacity: .75; }
    .afford-summary .s-item .s-val { font-size: 22px; font-weight: 800; }
    .afford-empty { text-align: center; padding: 80px 0; color: #64748b; }
    .afford-empty .icon { font-size: 48px; margin-bottom: 16px; }
  </style>
  <script>(function(){if(localStorage.getItem('bb_darkmode')==='1')document.documentElement.setAttribute('data-theme','dark')})()</script>
</head>
<body>
<div id="header-mount"></div>

<div class="page-header">
  <div class="container">
    <h1 id="aff-h1"></h1>
    <p id="aff-sub-text"></p>
  </div>
</div>

<section>
  <div class="container">
    <div class="afford-form">
      <div class="form-row">
        <div class="form-group">
          <label id="aff-lbl-budget"></label>
          <input type="number" id="aff-budget" min="0" step="1000">
        </div>
        <div class="form-group">
          <label id="aff-lbl-cat"></label>
          <select id="aff-category">
            <option value="" id="aff-opt-all-cats"></option>
          </select>
        </div>
        <div class="form-group">
          <label id="aff-lbl-city"></label>
          <select id="aff-city">
            <option value="" id="aff-opt-all-cities"></option>
          </select>
        </div>
        <div class="form-group">
          <button class="btn btn-primary" id="aff-submit" style="padding:10px 28px;white-space:nowrap;"></button>
        </div>
      </div>
      <div id="aff-error" style="display:none;color:#ef4444;margin-top:10px;font-size:14px;"></div>
    </div>

    <div id="aff-summary" style="display:none;" class="afford-summary">
      <div class="s-item">
        <div class="s-lbl" id="aff-s-lbl-count"></div>
        <div class="s-val" id="aff-count">0</div>
      </div>
      <div class="s-item">
        <div class="s-lbl" id="aff-s-lbl-rev"></div>
        <div class="s-val" id="aff-avg-revenue">—</div>
      </div>
      <div class="s-item">
        <div class="s-lbl" id="aff-s-lbl-profit"></div>
        <div class="s-val" id="aff-avg-profit">—</div>
      </div>
    </div>

    <div class="listing-grid" id="aff-grid"></div>

    <div id="aff-empty" style="display:none;" class="afford-empty">
      <div class="icon">🔍</div>
      <h3 id="aff-empty-h3"></h3>
      <p id="aff-empty-p"></p>
      <a href="listings.html" class="btn btn-primary" style="margin-top:16px" id="aff-empty-btn"></a>
    </div>
  </div>
</section>

<div id="footer-mount"></div>
<script src="js/app.js"></script>
<script>
(async function(){
  mountLayout("listings");

  const AFF_COPY = {
    az: {
      doc_title: "Büdcəmə uyğun biznes — BizBazar.az",
      h1: "Büdcəmə uyğun bizneslər",
      sub: "Büdcənizi daxil edin — uyğun elanları tapaq",
      lbl_budget: "Büdcə (AZN)", budget_ph: "məs. 50000",
      lbl_cat: "Kateqoriya (istəyə görə)",
      lbl_city: "Şəhər (istəyə görə)",
      all: "Hamısı",
      search: "Axtar",
      err_budget: "Zəhmət olmasa büdcəni daxil edin.",
      s_count: "Tapılan elan", s_rev: "Ortalama aylıq gəlir", s_profit: "Ortalama aylıq mənfəət",
      count_suffix: "elan",
      empty_h3: "Heç bir elan tapılmadı",
      empty_p: "Seçdiyiniz büdcə və filtrlərlə uyğun elan yoxdur.<br>Büdcəni artırmağa və ya filtrləri dəyişməyə cəhd edin.",
      empty_btn: "Bütün elanlara bax"
    },
    en: {
      doc_title: "Within your budget — BizBazar.az",
      h1: "Businesses within your budget",
      sub: "Enter your budget — we'll find matching listings",
      lbl_budget: "Budget (AZN)", budget_ph: "e.g. 50000",
      lbl_cat: "Category (optional)",
      lbl_city: "City (optional)",
      all: "All",
      search: "Search",
      err_budget: "Please enter a budget.",
      s_count: "Listings found", s_rev: "Average monthly revenue", s_profit: "Average monthly profit",
      count_suffix: "listings",
      empty_h3: "No listings found",
      empty_p: "No listings match your budget and filters.<br>Try increasing the budget or changing filters.",
      empty_btn: "Browse all listings"
    },
    ru: {
      doc_title: "По вашему бюджету — BizBazar.az",
      h1: "Бизнесы по вашему бюджету",
      sub: "Введите бюджет — мы найдём подходящие объявления",
      lbl_budget: "Бюджет (AZN)", budget_ph: "напр. 50000",
      lbl_cat: "Категория (необязательно)",
      lbl_city: "Город (необязательно)",
      all: "Все",
      search: "Найти",
      err_budget: "Пожалуйста, введите бюджет.",
      s_count: "Найдено объявлений", s_rev: "Средний месячный доход", s_profit: "Средняя месячная прибыль",
      count_suffix: "объявлений",
      empty_h3: "Объявлений не найдено",
      empty_p: "Под ваш бюджет и фильтры объявлений нет.<br>Увеличьте бюджет или измените фильтры.",
      empty_btn: "Все объявления"
    }
  };
  const aff = () => AFF_COPY[getLang()] || AFF_COPY.az;

  const [listings, categories] = await Promise.all([loadListings(), loadCategories()]);
  const catById = Object.fromEntries(categories.map(c => [c.id, c]));

  // Populate selects
  const catSel = document.getElementById("aff-category");
  categories.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.id;
    opt.textContent = catLabel(c);
    catSel.appendChild(opt);
  });

  const citySel = document.getElementById("aff-city");
  [...new Set(listings.map(l => l.city))].sort().forEach(city => {
    const opt = document.createElement("option");
    opt.value = city;
    opt.textContent = city;
    citySel.appendChild(opt);
  });

  function applyCopy() {
    const c = aff();
    document.title = c.doc_title;
    document.getElementById("aff-h1").textContent = c.h1;
    document.getElementById("aff-sub-text").textContent = c.sub;
    document.getElementById("aff-lbl-budget").textContent = c.lbl_budget;
    document.getElementById("aff-budget").placeholder = c.budget_ph;
    document.getElementById("aff-lbl-cat").textContent = c.lbl_cat;
    document.getElementById("aff-lbl-city").textContent = c.lbl_city;
    document.getElementById("aff-opt-all-cats").textContent = c.all;
    document.getElementById("aff-opt-all-cities").textContent = c.all;
    document.getElementById("aff-submit").textContent = c.search;
    document.getElementById("aff-s-lbl-count").textContent = c.s_count;
    document.getElementById("aff-s-lbl-rev").textContent = c.s_rev;
    document.getElementById("aff-s-lbl-profit").textContent = c.s_profit;
    document.getElementById("aff-empty-h3").textContent = c.empty_h3;
    document.getElementById("aff-empty-p").innerHTML = c.empty_p;
    document.getElementById("aff-empty-btn").textContent = c.empty_btn;
  }
  applyCopy();

  // Read URL params for quick pre-fill
  const params = new URLSearchParams(location.search);
  if (params.get("budget")) document.getElementById("aff-budget").value = params.get("budget");
  if (params.get("category")) catSel.value = params.get("category");
  if (params.get("city")) citySel.value = params.get("city");

  function doSearch() {
    const c = aff();
    const budget = parseFloat(document.getElementById("aff-budget").value);
    const catFilter = catSel.value;
    const cityFilter = citySel.value;
    const errEl = document.getElementById("aff-error");

    if (!budget || budget <= 0) {
      errEl.textContent = c.err_budget;
      errEl.style.display = "block";
      return;
    }
    errEl.style.display = "none";

    let results = listings.filter(l => {
      if (l.price_azn > budget) return false;
      if (catFilter && l.category !== catFilter) return false;
      if (cityFilter && l.city !== cityFilter) return false;
      return true;
    });
    results.sort((a, b) => b.price_azn - a.price_azn);

    const grid = document.getElementById("aff-grid");
    const emptyEl = document.getElementById("aff-empty");
    const summaryEl = document.getElementById("aff-summary");

    if (results.length === 0) {
      grid.innerHTML = "";
      emptyEl.style.display = "block";
      summaryEl.style.display = "none";
    } else {
      emptyEl.style.display = "none";
      summaryEl.style.display = "flex";

      const avgRev = Math.round(results.reduce((s, l) => s + (l.monthly_revenue_azn || 0), 0) / results.length);
      const avgProfit = Math.round(results.reduce((s, l) => s + (l.monthly_profit_azn || 0), 0) / results.length);
      document.getElementById("aff-count").textContent = results.length + " " + c.count_suffix;
      document.getElementById("aff-avg-revenue").textContent = fmtAZN(avgRev);
      document.getElementById("aff-avg-profit").textContent = fmtAZN(avgProfit);

      grid.innerHTML = results.map(l => listingCardHTML(l, catById)).join("");
    }
    applyI18n();
  }

  document.getElementById("aff-submit").addEventListener("click", doSearch);
  document.getElementById("aff-budget").addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });

  // Auto-search if budget was in URL
  if (params.get("budget")) doSearch();

  applyI18n();
  window.addEventListener("langchange", () => { applyCopy(); if (parseFloat(document.getElementById("aff-budget").value) > 0) doSearch(); });
})();
</script>
</body>
</html>
