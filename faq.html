let activeFaqTab = null;

function renderFaq() {
  const data = FAQ_DATA[getLang()] || FAQ_DATA.az;
  document.title = data.pageTitle + " — BizBazar.az";
  document.getElementById("page-title").textContent = data.pageTitle;
  document.getElementById("page-sub").textContent = data.pageSub;
  document.getElementById("more-help-text").textContent = data.moreHelp;
  document.getElementById("more-help-btn").textContent = data.moreHelpBtn;

  if (!activeFaqTab || !data.categories.find(c => c.id === activeFaqTab)) {
    activeFaqTab = data.categories[0].id;
  }

  const tabs = document.getElementById("faq-tabs");
  tabs.innerHTML = data.categories.map(cat => `
    <button type="button" class="faq-tab${cat.id === activeFaqTab ? ' active' : ''}" data-cat="${cat.id}">${cat.label}</button>
  `).join("");

  const sections = document.getElementById("faq-sections");
  sections.innerHTML = data.categories.map(cat => `
    <div class="faq-section${cat.id === activeFaqTab ? ' active' : ''}" data-cat="${cat.id}">
      <h2>${cat.title}</h2>
      ${cat.items.map(it => `
        <details class="faq-item">
          <summary>${it.q}</summary>
          <div class="faq-answer">${it.a}</div>
        </details>
      `).join("")}
    </div>
  `).join("");

  tabs.querySelectorAll(".faq-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      activeFaqTab = btn.dataset.cat;
      tabs.querySelectorAll(".faq-tab").forEach(b => b.classList.toggle("active", b.dataset.cat === activeFaqTab));
      sections.querySelectorAll(".faq-section").forEach(s => s.classList.toggle("active", s.dataset.cat === activeFaqTab));
    });
  });
}

(function(){
  mountLayout("faq");
  renderFaq();
  window.addEventListener("langchange", () => { renderFaq(); });
})();
