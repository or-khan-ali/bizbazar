<body>
<div id="header-mount"></div>

<section class="hero">
  <div class="container">
    <span class="hero-eyebrow" data-i18n="home_hero_eyebrow"></span>
    <h1 data-i18n="home_hero_title"></h1>

    <div class="hero-cta" style="display:flex;gap:12px;flex-wrap:wrap;margin:20px 0 8px;">
      <a href="sell.html" class="btn btn-accent btn-lg" data-i18n="home_hero_cta_primary"></a>

    </div>

    <p class="hero-confidential-note" data-i18n="home_hero_confidential_note" style="margin-top:8px;font-size:0.9rem;opacity:0.8;"></p>

    <div class="hero-buyer-search" style="margin-top:28px;">
      <p class="hero-buyer-label" data-i18n="home_hero_buyer_label" style="margin-bottom:10px;font-weight:600;"></p>

        <select name="city" id="hero-city">

        <input type="number" name="max_price" data-i18n-placeholder="search_price" min="0" step="1000">
        <button type="submit" class="btn btn-primary btn-lg" data-i18n="hero_find"></button>

    </div>
  </div>
</section>

<section>
  <div class="container">
    <div class="section-head">
      <div>
        <h2 data-i18n="cat_title"></h2>

      </div>
    </div>
    <div class="cat-grid" id="cat-grid"></div>
    <div class="pill-links" id="extra-links" style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;"></div>
  </div>
</section>

<section style="background: var(--bg-soft);">

<!-- Franchises preview -->
<section>

    </div>
    <div class="trust-grid">

        <div class="trust-icon">1</div>

<section style="background: var(--bg-soft);">

      <div>
        <h2 data-i18n="services_title"></h2>
        <p class="section-sub" data-i18n="services_sub"></p>

      <a href="services.html" class="btn btn-outline" data-i18n="view_all"></a>

    <div class="services-grid" id="services-preview"></div>

<!-- C) Valuation CTA band -->
<section>

<script src="js/app.js?v=phase2"></script>
<script>
// Seller-first home hero copy (AZ/RU/EN). Inline so app.js stays untouched.
// Honest, pre-launch wording: no traction numbers, no fabricated social proof.
Object.assign(STRINGS.az, {
  home_hero_eyebrow: "Biznes sahibləri üçün",
  home_hero_title: "Biznesinizi Azərbaycanda məxfi şəkildə satın",
  home_hero_sub: "BizBazar.az biznesinizi yalnız ciddi, yoxlanılmış alıcılara təqdim etməyə kömək edir. Elanınızı moderasiya edirik, həssas maliyyə və əlaqə məlumatlarını qoruyuruq və onları yalnız sorğu göndərən, seçilmiş alıcılarla paylaşırıq.",
  home_hero_cta_primary: "Biznesinizi siyahıya əlavə edin",
  home_hero_cta_secondary: "Pulsuz qiymətləndirmə alın",
  home_hero_confidential_note: "Açıq və ya məxfi elan seçin. Həssas detallar saytda göstərilmir — onları yalnız komandamız yoxladıqdan sonra sizə sorğu göndərən alıcılarla paylaşırıq.",
  home_hero_buyer_label: "Biznes almaq istəyirsiniz? Mövcud imkanları nəzərdən keçirin:",
  home_valuation_band_sub: "Satışdan əvvəl biznesinizin təxmini dəyərini öyrənin — sadə, pulsuz qiymətləndirmə alətimizlə."
});
Object.assign(STRINGS.en, {
  home_hero_eyebrow: "For business owners",
  home_hero_title: "Sell your business in Azerbaijan, confidentially",
  home_hero_sub: "BizBazar.az helps you present your business only to serious, screened buyers. We moderate your listing, protect your sensitive financial and contact details, and share them only with buyers who request access.",
  home_hero_cta_primary: "List your business",
  home_hero_cta_secondary: "Get a free valuation",
  home_hero_confidential_note: "Choose a public or confidential listing. Sensitive details are not shown on the site — we share them only with buyers who request access, after our team reviews the request.",
  home_hero_buyer_label: "Looking to buy a business? Browse available opportunities:",
  home_valuation_band_sub: "Find out what your business could be worth before you sell — with our simple, free valuation tool."
});
Object.assign(STRINGS.ru, {
  home_hero_eyebrow: "Для владельцев бизнеса",
  home_hero_title: "Продайте свой бизнес в Азербайджане конфиденциально",
  home_hero_sub: "BizBazar.az помогает показать ваш бизнес только серьёзным, проверенным покупателям. Мы модерируем объявление, защищаем чувствительные финансовые и контактные данные и передаём их только покупателям, запросившим доступ.",
  home_hero_cta_primary: "Разместить бизнес",
  home_hero_cta_secondary: "Получить бесплатную оценку",
  home_hero_confidential_note: "Выберите открытое или конфиденциальное объявление. Чувствительные данные не показываются на сайте — мы передаём их только покупателям, запросившим доступ, после проверки запроса нашей командой.",
  home_hero_buyer_label: "Хотите купить бизнес? Посмотрите доступные предложения:",
  home_valuation_band_sub: "Узнайте примерную стоимость вашего бизнеса перед продажей — с помощью нашего простого бесплатного инструмента оценки."
});

(async function(){
  mountLayout("home");

  const [listings, categories, services] = await Promise.all([
    loadListings(), loadCategories(), loadServices()
  ]);
  const catById = Object.fromEntries(categories.map(c => [c.id, c]));
  const catCount = {};
  listings.forEach(l => { catCount[l.category] = (catCount[l.category]||0)+1; });

  // hero search dropdowns
  const heroCat = document.getElementById("hero-category");
  categories.forEach(c => {
    const o = document.createElement("option");
    o.value = c.id; o.dataset.labelAz = c.label_az; o.dataset.labelEn = c.label_en;
    o.textContent = catLabel(c);
    heroCat.appendChild(o);
  });
  const heroCity = document.getElementById("hero-city");
  [...new Set(listings.map(l => l.city))].sort().forEach(city => {
    const o = document.createElement("option");
    o.value = city; o.textContent = city;
    heroCity.appendChild(o);
  });

  // category cards
  const catGrid = document.getElementById("cat-grid");
  catGrid.innerHTML = categories.map(c => `
    <a class="cat-card" href="listings.html?category=${c.id}">
      <div class="cat-icon">${CATEGORY_ICONS[c.id] || "🏢"}</div>
      <div class="cat-label">${catLabel(c)}</div>
      <div class="cat-count">${catCount[c.id]||0}</div>
    </a>
  `).join("");

  // extra pill links: benchmarks and map
  const extraLinks = document.getElementById("extra-links");
  extraLinks.innerHTML = `
    <a href="benchmarks.html" class="btn btn-outline btn-sm" data-i18n="benchmarks_link"></a>
    <a href="map.html" class="btn btn-outline btn-sm" data-i18n="map_link"></a>
  `;

  // featured listings (up to 6)
  const featured = listings.filter(l => l.featured).slice(0, 6);
  const grid = document.getElementById("featured-grid");
  grid.innerHTML = featured.map(l => listingCardHTML(l, catById)).join("");

  // Franchise preview (3 featured franchises)
  try {
    const franchises = await loadFranchises();
    const fpGrid = document.getElementById("franchise-preview");
    if (fpGrid) {
      const fpFeatured = franchises.filter(f => f.featured).slice(0, 3);
      fpGrid.innerHTML = fpFeatured.map(f => `
        <a class="listing-card" href="franchises.html" style="text-decoration:none;">
          <div class="listing-image" style="background:linear-gradient(135deg,#fdf6e3,#f5e6a8);font-size:64px;color:var(--primary);">${f.logo}</div>
          <div class="listing-body">
            <div class="verified-badge">✓ ${t("verified")}</div>
            <div class="listing-cat">${catLabel(catById[f.category])}</div>
            <h3 class="listing-title">${f.brand} — ${locField(f, "name").replace(f.brand + ' — ', '').replace(f.brand + ' - ', '')}</h3>
            <div class="listing-loc">📍 ${f.country_origin} · ${f.branches_open} ${t("franchise_branches")}</div>
            <div class="listing-meta">
              <span>💰 ${t("franchise_payback")}: ${f.avg_payback_months} ${t("payback_unit")}</span>
              <span>📐 ${f.area_required_m2 || 0} m²</span>
            </div>
            <div class="listing-price">${fmtAZN(f.investment_min_azn)}<span class="listing-price-sub">${t("franchise_investment")}</span></div>
          </div>
        </a>`).join("");
    }
  } catch(e) { console.warn("Franchise preview failed:", e); }

  // A) Recently viewed strip
  const recentIds = getRecentlyViewed();
  if (recentIds.length > 0) {
    const recentListings = recentIds
      .map(id => listings.find(l => l.id === id))
      .filter(Boolean)
      .slice(0, 8);
    if (recentListings.length > 0) {
      document.getElementById("recent-section").style.display = "";
      document.getElementById("recent-strip").innerHTML = recentListings.map(l => `
        <a class="recent-card" href="listing.html?id=${l.id}">
          <img src="${getListingThumb(l)}" alt="${locField(l,'title')}" loading="lazy">
          <div class="recent-card-body">
            <div class="recent-card-title">${locField(l,"title")}</div>
            <div class="recent-card-price">${fmtAZN(l.price_azn)}</div>
          </div>
        </a>
      `).join("");
    }
  }

  // services preview
  const sp = document.getElementById("services-preview");
  sp.innerHTML = services.categories.slice(0, 6).map(s => `
    <div class="service-card">
      <div class="service-icon">${SERVICE_ICONS[s.id] || "🛠️"}</div>
      <h3>${getLang()==="az"?s.label_az:s.label_en}</h3>
      <p>${getLang()==="az"?s.description_az:s.description_en}</p>
      <div class="service-meta">
        <span><span data-i18n="service_from"></span> <strong>${fmtAZN(s.starting_price_azn)}</strong></span>
        <span>${s.typical_duration}</span>
      </div>
    </div>
  `).join("");

  applyI18n();

  // re-render data on language change
  window.addEventListener("langchange", () => location.reload());
})();
</script>
</body>
</html>
