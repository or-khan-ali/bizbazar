<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Əlaqə — BizBazar.az</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="description" content="BizBazar.az ilə əlaqə: telefon, email, WhatsApp, Telegram. Sualınızı bizə göndərin.">
  <meta name="keywords" content="BizBazar əlaqə, biznes platforma əlaqə">
  <meta name="author" content="BizBazar.az">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Əlaqə — BizBazar.az">
  <meta property="og:description" content="BizBazar.az ilə əlaqə: telefon, email, WhatsApp, Telegram. Sualınızı bizə göndərin.">
  <meta property="og:url" content="https://bizbazar.az/contact.html">
  <meta property="og:image" content="https://bizbazar.az/favicon.svg">
  <meta property="og:site_name" content="BizBazar.az">
  <meta property="og:locale" content="az_AZ">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://bizbazar.az/contact.html">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="header-mount"></div>

<div class="page-header">
  <div class="container">
    <h1 id="page-title"></h1>
    <p id="page-sub"></p>
  </div>
</div>

<section>
  <div class="container">
    <div class="contact-layout">
      <!-- Left: contact info -->
      <div class="contact-info">
        <h2 id="info-heading"></h2>

        <div class="contact-item">
          <div class="ci-icon">📍</div>
          <div>
            <div class="ci-label" id="addr-label"></div>
            <div class="ci-value" id="addr-value"></div>
          </div>
        </div>

        <div class="contact-item">
          <div class="ci-icon">📱</div>
          <div>
            <div class="ci-label" id="phone-label"></div>
            <div class="ci-value"><a href="tel:+994502009088">+994 50 200 90 88</a></div>
          </div>
        </div>

        <div class="contact-item">
          <div class="ci-icon">✉️</div>
          <div>
            <div class="ci-label" id="email-label"></div>
            <div class="ci-value"><a href="mailto:info@bizbazar.az">info@bizbazar.az</a></div>
          </div>
        </div>

        <div class="contact-item">
          <div class="ci-icon">🕐</div>
          <div>
            <div class="ci-label" id="hours-label"></div>
            <div class="ci-value" id="hours-value"></div>
          </div>
        </div>

        <div class="contact-actions-stack">
          <a href="https://wa.me/994502009088" target="_blank" rel="noopener" class="wa-btn">WhatsApp</a>
          <a href="https://t.me/+994502009088" target="_blank" rel="noopener" class="tg-btn">Telegram</a>
        </div>
      </div>

      <!-- Right: contact form -->
      <div class="contact-form-card">
        <h2 id="form-heading"></h2>
        <form id="contact-form" action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
          <input type="hidden" name="subject" value="BizBazar.az contact form">
          <div class="form-row">
            <div class="form-field full">
              <label id="lbl-name"></label>
              <input type="text" name="name" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label id="lbl-email"></label>
              <input type="email" name="email" required>
            </div>
            <div class="form-field">
              <label id="lbl-phone"></label>
              <input type="tel" name="phone">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field full">
              <label id="lbl-subject"></label>
              <select name="topic" id="topic-select" required></select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field full">
              <label id="lbl-msg"></label>
              <textarea name="message" required></textarea>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg" id="submit-btn" style="width:100%"></button>
        </form>
        <div class="contact-success" id="contact-success"></div>
        <div class="contact-error" id="contact-error"></div>
      </div>
    </div>

    <div class="faq-link-card">
      <p id="faq-link-text"></p>
      <a href="faq.html" class="btn btn-outline" id="faq-link-btn"></a>
    </div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="js/app.js"></script>
<script>
const CONTACT_COPY = {
  az: {
    pageTitle: "Əlaqə",
    pageSub: "Suallarınız varmı? Bizimlə əlaqə saxlayın — 24 saat ərzində cavablandırırıq.",
    infoHeading: "Əlaqə məlumatları",
    addrLabel: "Ünvan",
    addrValue: "Bakı, Azərbaycan",
    phoneLabel: "Telefon",
    emailLabel: "E-poçt",
    hoursLabel: "İş saatları",
    hoursValue: "B.e – Cümə · 09:00 – 18:00",
    formHeading: "Bizə yazın",
    name: "Ad və soyad",
    email: "E-poçt",
    phone: "Telefon (istəyə bağlı)",
    subject: "Mövzu",
    msg: "Mesajınız",
    submit: "Göndər",
    topics: [
      { v: "general", l: "Ümumi sual" },
      { v: "listing", l: "Elan haqqında sual" },
      { v: "service", l: "Xidmət sorğusu" },
      { v: "bug",     l: "Səhv bildirişi" }
    ],
    success: "Təşəkkürlər! Mesajınız qəbul edildi. Komandamız tezliklə sizinlə əlaqə saxlayacaq.",
    error: "Xəta baş verdi. Zəhmət olmasa yenidən cəhd edin və ya birbaşa info@bizbazar.az ünvanına yazın.",
    faqText: "Sualınız var? Bəlkə cavabı FAQ səhifəmizdədir.",
    faqBtn: "FAQ-a bax →"
  },
  en: {
    pageTitle: "Contact",
    pageSub: "Have a question? Get in touch — we reply within 24 hours.",
    infoHeading: "Contact details",
    addrLabel: "Address",
    addrValue: "Baku, Azerbaijan",
    phoneLabel: "Phone",
    emailLabel: "Email",
    hoursLabel: "Working hours",
    hoursValue: "Mon – Fri · 09:00 – 18:00",
    formHeading: "Send us a message",
    name: "Full name",
    email: "Email",
    phone: "Phone (optional)",
    subject: "Subject",
    msg: "Your message",
    submit: "Send",
    topics: [
      { v: "general", l: "General question" },
      { v: "listing", l: "Listing question" },
      { v: "service", l: "Service inquiry" },
      { v: "bug",     l: "Bug report" }
    ],
    success: "Thank you! Your message has been received. Our team will get back to you shortly.",
    error: "An error occurred. Please try again or email us directly at info@bizbazar.az.",
    faqText: "Have a question? It might already be answered in our FAQ.",
    faqBtn: "View FAQ →"
  },
  ru: {
    pageTitle: "Контакты",
    pageSub: "Есть вопрос? Свяжитесь с нами — мы отвечаем в течение 24 часов.",
    infoHeading: "Контактная информация",
    addrLabel: "Адрес",
    addrValue: "Баку, Азербайджан",
    phoneLabel: "Телефон",
    emailLabel: "Email",
    hoursLabel: "Часы работы",
    hoursValue: "Пн – Пт · 09:00 – 18:00",
    formHeading: "Напишите нам",
    name: "Имя и фамилия",
    email: "Email",
    phone: "Телефон (необязательно)",
    subject: "Тема",
    msg: "Ваше сообщение",
    submit: "Отправить",
    topics: [
      { v: "general", l: "Общий вопрос" },
      { v: "listing", l: "Вопрос об объявлении" },
      { v: "service", l: "Запрос об услуге" },
      { v: "bug",     l: "Сообщить об ошибке" }
    ],
    success: "Спасибо! Ваше сообщение получено. Наша команда свяжется с вами в ближайшее время.",
    error: "Произошла ошибка. Попробуйте ещё раз или напишите нам на info@bizbazar.az.",
    faqText: "Есть вопрос? Возможно, ответ уже есть в нашем FAQ.",
    faqBtn: "Смотреть FAQ →"
  }
};

function renderContact() {
  const c = CONTACT_COPY[getLang()] || CONTACT_COPY.az;
  document.title = c.pageTitle + " — BizBazar.az";
  document.getElementById("page-title").textContent = c.pageTitle;
  document.getElementById("page-sub").textContent = c.pageSub;
  document.getElementById("info-heading").textContent = c.infoHeading;
  document.getElementById("addr-label").textContent = c.addrLabel;
  document.getElementById("addr-value").textContent = c.addrValue;
  document.getElementById("phone-label").textContent = c.phoneLabel;
  document.getElementById("email-label").textContent = c.emailLabel;
  document.getElementById("hours-label").textContent = c.hoursLabel;
  document.getElementById("hours-value").textContent = c.hoursValue;
  document.getElementById("form-heading").textContent = c.formHeading;
  document.getElementById("lbl-name").textContent = c.name;
  document.getElementById("lbl-email").textContent = c.email;
  document.getElementById("lbl-phone").textContent = c.phone;
  document.getElementById("lbl-subject").textContent = c.subject;
  document.getElementById("lbl-msg").textContent = c.msg;
  document.getElementById("submit-btn").textContent = c.submit;
  const sel = document.getElementById("topic-select");
  sel.innerHTML = c.topics.map(t => `<option value="${t.v}">${t.l}</option>`).join("");
  document.getElementById("contact-success").textContent = c.success;
  document.getElementById("contact-error").textContent = c.error;
  document.getElementById("faq-link-text").textContent = c.faqText;
  document.getElementById("faq-link-btn").textContent = c.faqBtn;
}

(function(){
  mountLayout("contact");
  renderContact();

  const form = document.getElementById("contact-form");
  const successEl = document.getElementById("contact-success");
  const errorEl = document.getElementById("contact-error");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const submitBtn = document.getElementById("submit-btn");
    submitBtn.disabled = true;
    successEl.style.display = "none";
    errorEl.style.display = "none";
    try {
      const data = new FormData(form);
      const resp = await fetch("https://api.web3forms.com/submit", { method: "POST", body: data });
      const json = await resp.json();
      if (json.success) {
        form.style.display = "none";
        successEl.style.display = "block";
        window.scrollTo({ top: successEl.offsetTop - 120, behavior: "smooth" });
      } else {
        errorEl.style.display = "block";
        submitBtn.disabled = false;
      }
    } catch (err) {
      errorEl.style.display = "block";
      submitBtn.disabled = false;
    }
  });

  window.addEventListener("langchange", () => { renderContact(); });
})();
</script>
</body>
</html>
