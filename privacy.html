function renderLegal(COPY, suffix) {
  const c = COPY[getLang()] || COPY.az;
  document.title = c.pageTitle + " — BizBazar.az";
  document.getElementById("page-title").textContent = c.pageTitle;
  document.getElementById("page-subtitle").textContent = c.pageSubtitle;
  document.getElementById("draft-banner").textContent = c.draft;
  document.getElementById("legal-note").textContent = c.note;
  document.getElementById("legal-body").innerHTML = c.sections.map(s => {
    let html = "<h2>" + s.h + "</h2>";
    if (s.paras) html += s.paras.map(p => "<p>" + p + "</p>").join("");
    if (s.list) html += "<ul>" + s.list.map(li => "<li>" + li + "</li>").join("") + "</ul>";
    return html;
  }).join("");
}

(function(){
  mountLayout("privacy");
  renderLegal(PRIVACY_COPY);
  window.addEventListener("langchange", () => { renderLegal(PRIVACY_COPY); });
})();
