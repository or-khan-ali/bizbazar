function renderAbout() {
  const c = ABOUT_COPY[getLang()] || ABOUT_COPY.az;
  document.title = c.pageTitle + " — BizBazar.az";
  document.getElementById("about-title").textContent = c.pageTitle;
  document.getElementById("about-subtitle").textContent = c.pageSubtitle;
  document.getElementById("story-heading").textContent = c.storyHeading;
  document.getElementById("story-p1").textContent = c.storyP1;
  document.getElementById("story-p2").textContent = c.storyP2;
  document.getElementById("mission-heading").textContent = c.missionHeading;
  document.getElementById("mission-text").textContent = c.missionText;
  document.getElementById("stat-label-listings").textContent = c.statListings;
  document.getElementById("stat-label-categories").textContent = c.statCategories;
  document.getElementById("stat-label-brokers").textContent = c.statBrokers;
  document.getElementById("stat-label-deals").textContent = c.statDeals;
  document.getElementById("values-heading").textContent = c.valuesHeading;
  document.getElementById("values-sub").textContent = c.valuesSub;
  document.getElementById("values-grid").innerHTML = c.values.map(v => `
    <div class="value-card">
      <div class="value-icon">${v.icon}</div>
      <h3>${v.title}</h3>
      <p>${v.desc}</p>
    </div>
  `).join("");
  document.getElementById("team-heading").textContent = c.teamHeading;
  document.getElementById("team-sub").textContent = c.teamSub;
  document.getElementById("team-grid").innerHTML = c.team.map(m => `
    <div class="team-card">
      <img src="${m.img}" alt="${m.name}" loading="lazy">
      <h4>${m.name}</h4>
      <div class="team-role">${m.role}</div>
      <p class="team-bio">${m.bio}</p>
    </div>
  `).join("");
  document.getElementById("cta-title").textContent = c.ctaTitle;
  document.getElementById("cta-sub").textContent = c.ctaSub;
  document.getElementById("cta-btn").textContent = c.ctaBtn;
}

(function(){
  mountLayout("about");
  renderAbout();
  window.addEventListener("langchange", () => { renderAbout(); });
})();
