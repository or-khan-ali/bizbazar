<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Biznes elanı — BizBazar.az</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- SEO -->
  <meta name="description" content="BizBazar.az biznes elanı: satış qiyməti, əsas göstəricilər, məxfi NDA sorğusu və due diligence dəstəyi.">
  <meta name="keywords" content="biznes elanı, hazır biznes almaq, biznes satılır, NDA, due diligence">
  <meta name="author" content="BizBazar.az">
  <meta name="robots" content="index, follow">

  <!-- Open Graph (for social sharing) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Biznes elanı — BizBazar.az">
  <meta property="og:description" content="Biznes haqqında açıq məlumatlar, məxfi NDA sorğusu və due diligence dəstəyi.">
  <meta property="og:url" content="https://bizbazar.az/listing.html">
  <meta property="og:image" content="https://bizbazar.az/favicon.svg">
  <meta property="og:site_name" content="BizBazar.az">
  <meta property="og:locale" content="az_AZ">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Biznes elanı — BizBazar.az">
  <meta name="twitter:description" content="Biznes haqqında açıq məlumatlar, məxfi NDA sorğusu və due diligence dəstəyi.">
  <meta name="twitter:image" content="https://bizbazar.az/favicon.svg">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://bizbazar.az/listing.html">

  <link rel="stylesheet" href="css/styles.css">
  <script>(function(){if(localStorage.getItem('bb_darkmode')==='1')document.documentElement.setAttribute('data-theme','dark')})()</script>
</head>
<body>
<div id="header-mount"></div>

<div class="container">
  <div class="detail-layout" id="detail-root">
    <div class="detail"></div>
    <aside class="detail-aside"></aside>
  </div>
</div>

<!-- E) Similar listings -->
<section style="background:var(--bg-soft)" id="similar-section" style="display:none">
  <div class="container">
    <h2 data-i18n="similar_listings"></h2>
    <div class="similar-grid listing-grid" id="similar-grid"></div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="js/app.js?v=phase2"></script>
<script>
(async function(){
  mountLayout("listings");
  const id = new URLSearchParams(location.search).get("id");
  const [listings, categories, brokers] = await Promise.all([
    loadListings(), loadCategories(), loadBrokers()
  ]);
  const catById = Object.fromEntries(categories.map(c => [c.id, c]));
  const l = listings.find(x => x.id === id);
  const root = document.getElementById("detail-root");

  if (!l) {
    root.innerHTML = `<div style="grid-column:1/-1;padding:60px 0;text-align:center;">
      <h2 style="margin:0 0 8px;">Listing not found</h2>
      <a href="listings.html" class="btn btn-primary" style="margin-top:14px;">← Browse listings</a>
    </div>`;
    applyI18n();
    return;
  }

  // F) Track recently viewed
  addRecentlyViewed(l.id);

  const cat = catById[l.category];
  const icon = CATEGORY_ICONS[l.category] || "🏢";
  const sellerKey = l.seller_type === "owner" ? "detail_owner" : (l.seller_type === "broker" ? "detail_broker" : "detail_agency");
  const listingTitle = locField(l, "title") || l.title_az || l.id;
  document.title = `${listingTitle} — BizBazar.az`;
  const metaDescription = `${listingTitle}. ${locCity(l.city)} üzrə biznes elanı. Tam maliyyə məlumatları NDA və komanda təsdiqindən sonra paylaşılır.`;
  document.querySelector('meta[name="description"]')?.setAttribute("content", metaDescription);
  document.querySelector('meta[property="og:title"]')?.setAttribute("content", `${listingTitle} — BizBazar.az`);
  document.querySelector('meta[property="og:description"]')?.setAttribute("content", metaDescription);

  // A) Photo gallery
  const photos = getListingPhotos(l);
  const galleryHTML = `
    <div class="listing-gallery" id="listing-gallery">
      <img class="gallery-main" src="${photos[0]}" alt="${locField(l,'title')}" loading="lazy">
      <div class="gallery-thumbs">
        <img src="${photos[1]}" alt="" loading="lazy">
        <img src="${photos[2]}" alt="" loading="lazy">
      </div>
    </div>
  `;

  const left = root.querySelector(".detail");
  left.innerHTML = `
    ${galleryHTML}
    <div class="listing-cat" style="margin-bottom:6px;">${catLabel(cat)}</div>
    <h1>${escHTML(listingTitle)}</h1>
    <div class="meta-row">
      <span>📍 ${locDistrict(l.district)}, ${locCity(l.city)}</span>
      <span>📅 <span data-i18n="detail_posted"></span>: ${fmtDate(l.posted_date)}</span>
      <span>🔖 ID: ${l.id}</span>
    </div>

    <h2 data-i18n="detail_specs"></h2>
    <div class="detail-kpis">
      <div class="kpi">
        <div class="kpi-label" data-i18n="detail_ask_price"></div>
        <div class="kpi-value">${fmtAZN(l.price_azn)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label" data-i18n="detail_revenue"></div>
        <div class="kpi-value locked-value" data-i18n="detail_financial_locked"></div>
      </div>
      <div class="kpi">
        <div class="kpi-label" data-i18n="detail_profit"></div>
        <div class="kpi-value locked-value" data-i18n="detail_financial_locked"></div>
      </div>
      <div class="kpi">
        <div class="kpi-label" data-i18n="detail_staff"></div>
        <div class="kpi-value">${l.staff_count}</div>
      </div>
    </div>

    <div class="confidential-panel">
      <h2 data-i18n="detail_confidential_title"></h2>
      <p data-i18n="detail_confidential_text"></p>
    </div>

    <h2 data-i18n="detail_overview"></h2>
    <p class="detail-description">${escHTML(locField(l, "description"))}</p>

    <h2 data-i18n="detail_specs"></h2>
    <div class="detail-spec">
      <dl>
        <dt data-i18n="detail_area"></dt><dd>${fmtNum(l.area_m2)} m²</dd>
        <dt data-i18n="detail_years"></dt><dd>${l.operating_years}</dd>
        <dt data-i18n="detail_reason"></dt><dd>${escHTML(locField(l, "reason"))}</dd>
        <dt data-i18n="detail_equipment"></dt><dd>${l.equipment_included ? t("detail_yes") : t("detail_no")}</dd>
        <dt data-i18n="detail_license"></dt><dd>${l.license_included ? t("detail_yes") : t("detail_no")}</dd>
        <dt data-i18n="detail_rent"></dt><dd data-i18n="detail_financial_locked"></dd>
      </dl>
    </div>

    <div class="verification-panel">
      <h2 data-i18n="detail_verification_title"></h2>
      <div class="verification-list">
        <div class="verification-item"><span>•</span><div data-i18n="detail_verify_owner"></div></div>
        <div class="verification-item"><span>•</span><div data-i18n="detail_verify_pending"></div></div>
      </div>
    </div>

    <div class="disclaimer-panel" data-i18n="detail_disclaimer"></div>
  `;

  // D) Broker card — render after description if broker_id exists
  if (l.broker_id) {
    const broker = brokers.find(b => b.id === l.broker_id);
    if (broker) {
      const brokerBio = getLang() === "az" ? broker.bio_az : broker.bio_en;
      const brokerCard = document.createElement("div");
      brokerCard.className = "broker-card";
      brokerCard.innerHTML = `
        <div class="broker-card-inner">
          <img class="broker-avatar" src="${broker.avatar}" alt="${broker.name}" loading="lazy">
          <div class="broker-info">
            <div class="broker-name">${broker.name}</div>
              <p class="broker-bio">${brokerBio}</p>
              <a class="wa-btn" href="https://wa.me/994502009088?text=${encodeURIComponent(listingTitle + ' üzrə broker dəstəyi istəyirəm.')}" target="_blank" rel="noopener">📱 WhatsApp</a>
            <a href="broker.html?id=${broker.id}" class="btn btn-outline btn-sm" style="margin-top:8px;" data-i18n="broker_profile_link"></a>
          </div>
        </div>
      `;
      left.appendChild(brokerCard);
    }
  }

  // C) Build contact actions HTML
  let contactHTML = `<div class="contact-actions">`;
  contactHTML += `<a class="wa-btn" href="https://wa.me/994502009088?text=${encodeURIComponent(listingTitle + ' (' + l.id + ') üzrə məxfi məlumat almaq istəyirəm.')}" target="_blank" rel="noopener">📱 WhatsApp</a>`;
  contactHTML += `</div>`;

  const right = root.querySelector(".detail-aside");
  right.innerHTML = `
    <div class="price-card">
      <div class="seller-tag">👤 <span data-i18n="${sellerKey}"></span></div>
      <div class="price-main">${fmtAZN(l.price_azn)}</div>
      <div class="price-usd">${fmtUSD(l.price_azn)}</div>
      <p style="font-size:13px;color:var(--text-muted);margin:10px 0 0;" data-i18n="detail_confidential_text"></p>
      <div class="divider"></div>
      <button class="btn btn-primary btn-lg" id="nda-request-btn" data-i18n="detail_nda"></button>
      <button class="btn btn-accent btn-lg" id="contact-seller-btn" style="width:100%;margin-top:8px" data-i18n="detail_inquiry"></button>
      <div id="nda-status" class="form-note" style="display:none;margin-top:10px;margin-bottom:0;"></div>
      ${contactHTML}
    </div>
    <div class="services-hint">
      <h4 data-i18n="detail_services_title"></h4>
      <p data-i18n="detail_services_sub"></p>
      <a href="services.html" class="btn btn-outline btn-sm" data-i18n="detail_services_btn"></a>
    </div>
  `;

  applyI18n();

  right.querySelector("#nda-request-btn").addEventListener("click", async () => {
    const btn = right.querySelector("#nda-request-btn");
    const statusEl = right.querySelector("#nda-status");
    try {
      const { auth } = await import("./js/firebase.js");
      if (!auth.currentUser) {
        location.href = "auth.html?returnTo=" + encodeURIComponent(location.href);
        return;
      }
      btn.disabled = true;
      statusEl.style.display = "block";
      statusEl.textContent = t("form_submitting");
      const { submitNdaRequest } = await import("./js/data-service.js");
      const result = await submitNdaRequest({
        listingId: l.id,
        listingTitle,
        requesterName: auth.currentUser.displayName || "",
        requesterEmail: auth.currentUser.email || "",
        requesterPhone: auth.currentUser.phoneNumber || "",
        sourcePage: "listing.html"
      });
      statusEl.textContent = result.mode === "fallback"
        ? `${t("form_backend_fallback")} ${t("nda_manual_review_note")}`
        : t("nda_manual_review_note");
    } catch(e) {
      statusEl.style.display = "block";
      statusEl.textContent = t("form_backend_error");
      btn.disabled = false;
    }
  });

  document.getElementById("contact-seller-btn").addEventListener("click", () => {
    location.href = `contact.html?topic=listing&listing_id=${encodeURIComponent(l.id)}&listing_title=${encodeURIComponent(listingTitle)}`;
  });

  // E) Similar listings
  const similar = listings.filter(s => s.category === l.category && s.id !== l.id).slice(0, 3);
  if (similar.length > 0) {
    const simSection = document.getElementById("similar-section");
    simSection.style.display = "";
    document.getElementById("similar-grid").innerHTML = similar.map(s => listingCardHTML(s, catById)).join("");
  }

  window.addEventListener("langchange", () => location.reload());
})();
</script>
</body>
</html>
