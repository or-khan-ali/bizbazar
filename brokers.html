<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brokerlər — BizBazar.az</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="description" content="Azərbaycanda fəaliyyət göstərən yoxlanmış peşəkar biznes brokerləri. Reytinqlər, sövdələşmə tarixçəsi, ixtisaslaşmalar və birbaşa əlaqə.">
  <meta name="keywords" content="biznes broker, peşəkar broker, biznes agentlik, M&A broker, Bakı broker, Azərbaycan biznes broker">
  <meta name="author" content="BizBazar.az">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Brokerlər — BizBazar.az">
  <meta property="og:description" content="Azərbaycanda fəaliyyət göstərən yoxlanmış peşəkar biznes brokerləri.">
  <meta property="og:url" content="https://bizbazar.az/brokers.html">
  <meta property="og:image" content="https://bizbazar.az/favicon.svg">
  <meta property="og:site_name" content="BizBazar.az">
  <meta property="og:locale" content="az_AZ">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://bizbazar.az/brokers.html">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ==== HERO ==== */
    .br-hero {
      background:
        radial-gradient(circle at 20% 0%, rgba(99,102,241,.14) 0%, transparent 50%),
        radial-gradient(circle at 80% 100%, rgba(16,185,129,.10) 0%, transparent 50%),
        linear-gradient(180deg, #f5f3ff 0%, #ffffff 100%);
      padding: 72px 0 48px;
    }
    .br-hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(99,102,241,.10); color: #4f46e5;
      padding: 6px 14px; border-radius: 999px;
      font-size: 13px; font-weight: 600; margin-bottom: 16px;
    }
    .br-hero h1 {
      font-size: 44px; font-weight: 800; margin: 0 0 14px;
      letter-spacing: -.025em; line-height: 1.1; max-width: 720px;
    }
    .br-hero h1 span { color: #6366f1; }
    .br-hero-lead {
      color: var(--text-muted); font-size: 18px;
      max-width: 680px; line-height: 1.55; margin: 0 0 32px;
    }
    .br-trust-strip {
      display: flex; gap: 28px; flex-wrap: wrap;
      padding-top: 28px; border-top: 1px solid rgba(99,102,241,.15);
      margin-top: 32px;
    }
    .br-trust-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: var(--text); font-weight: 500;
    }
    .br-trust-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .br-stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 20px; margin-top: 36px;
    }
    .br-stat {
      background: white; border: 1px solid var(--border);
      border-radius: 14px; padding: 20px;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .br-stat:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,.10); }
    .br-stat-num {
      font-size: 28px; font-weight: 800; color: #4f46e5;
      letter-spacing: -.02em; line-height: 1;
    }
    .br-stat-label { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

    /* ==== SEARCH + FILTERS ==== */
    .br-search-bar {
      background: white; border: 1px solid var(--border);
      border-radius: 16px; padding: 14px;
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.03);
    }
    .br-search-input {
      flex: 2 1 280px;
      padding: 11px 16px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 14px; background: #fafafa;
      transition: all .15s ease;
    }
    .br-search-input:focus {
      outline: none; border-color: #6366f1; background: white;
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
    }

    .br-filter-bar {
      background: white; border: 1px solid var(--border);
      border-radius: 16px; padding: 14px;
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,.03);
    }
    .br-filter-bar select {
      padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 14px; font-weight: 500;
      background: #fafafa; cursor: pointer;
      flex: 1 1 160px; transition: all .15s ease;
    }
    .br-filter-bar select:hover { border-color: #6366f1; background: white; }
    .br-filter-bar select:focus {
      outline: none; border-color: #6366f1; background: white;
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
    }

    .br-results-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
    }
    .br-count-text { font-size: 14px; color: var(--text-muted); }
    .br-count-text strong { color: var(--text); font-weight: 700; }

    /* ==== BROKER CARDS ==== */
    .br-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 24px;
    }

    .br-card {
      background: white; border: 1px solid var(--border);
      border-radius: 18px; padding: 28px;
      display: flex; flex-direction: column; gap: 16px;
      position: relative; overflow: hidden;
      transition: all .25s cubic-bezier(.4, 0, .2, 1);
    }
    .br-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(99,102,241,.14);
      border-color: #c7d2fe;
    }
    .br-card.featured {
      border: 2px solid #6366f1;
      background: linear-gradient(180deg, #fafaff 0%, #ffffff 60%);
    }
    .br-card.featured::after {
      content: "★ Premium Broker";
      position: absolute; top: 16px; right: 16px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white; font-size: 11px; font-weight: 700;
      padding: 5px 12px; border-radius: 999px;
      letter-spacing: 0.3px;
    }

    /* card head */
    .br-card-head {
      display: flex; align-items: flex-start; gap: 14px;
    }
    .br-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
      border: 3px solid #ede9fe;
      box-shadow: 0 4px 12px rgba(99,102,241,.20);
    }
    .br-card.featured .br-avatar { border-color: #c7d2fe; }
    .br-name-block { flex: 1; min-width: 0; }
    .br-name {
      font-weight: 700; font-size: 17px; color: var(--text);
      margin: 0 0 4px; letter-spacing: -.01em;
    }
    .br-name-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text-muted); flex-wrap: wrap;
    }
    .br-verified-icon {
      display: inline-flex; align-items: center; gap: 4px;
      color: #10b981; font-weight: 600; font-size: 12px;
    }

    /* type badge */
    .br-tag-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .br-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
    }
    .br-tag.broker  { background: #dbeafe; color: #1d4ed8; }
    .br-tag.agency  { background: #fef3c7; color: #b45309; }
    .br-tag.license { background: #f0fdf4; color: #166534; font-family: ui-monospace, monospace; }

    /* rating block */
    .br-rating-block {
      background: linear-gradient(135deg, #faf5ff 0%, #f0fdf4 100%);
      border: 1px solid #ede9fe;
      border-radius: 14px;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .br-rating-cell { text-align: center; }
    .br-rating-cell .lbl {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      font-weight: 600; margin-bottom: 4px;
    }
    .br-rating-cell .val {
      font-size: 18px; font-weight: 800; color: #1e1b4b;
      letter-spacing: -.02em;
    }
    .br-rating-cell .stars-mini {
      color: #f59e0b; font-size: 12px;
    }

    /* specialties */
    .br-section-label {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.6px;
      font-weight: 600; margin-bottom: 8px;
    }
    .br-specialty-pills {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .br-specialty-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: #f5f3ff; color: #4338ca;
      border-radius: 8px; padding: 4px 10px;
      font-size: 12px; font-weight: 500;
    }

    .br-bio {
      color: var(--text-muted); font-size: 13px;
      line-height: 1.55; margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* meta row */
    .br-meta-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 12px 0;
      border-top: 1px dashed var(--border);
      border-bottom: 1px dashed var(--border);
    }
    .br-meta-cell {
      display: flex; flex-direction: column; gap: 2px;
    }
    .br-meta-cell-label {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.4px;
      font-weight: 600;
    }
    .br-meta-cell-value {
      font-size: 13px; color: var(--text); font-weight: 600;
    }
    .br-langs {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .br-lang-tag {
      background: #e2e8f0; color: #374151;
      border-radius: 4px; padding: 1px 6px;
      font-size: 10px; font-weight: 700;
    }

    /* actions */
    .br-actions {
      display: flex; gap: 8px;
    }
    .br-actions .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      border: none; box-shadow: 0 4px 12px rgba(99,102,241,.30);
      padding: 10px 14px; border-radius: 10px;
      color: white; font-weight: 600; font-size: 13px;
      text-decoration: none; text-align: center;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .br-actions .btn-primary:hover {
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      box-shadow: 0 6px 16px rgba(99,102,241,.40);
      transform: translateY(-1px);
    }
    .br-icon-btn {
      width: 40px; height: 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      background: white; transition: all .15s ease;
      font-size: 16px; text-decoration: none; color: var(--text);
    }
    .br-icon-btn.wa { color: #25d366; border-color: #25d366; }
    .br-icon-btn:hover { transform: translateY(-1px); }
    .br-icon-btn.wa:hover { background: #25d366; color: white; }

    /* empty state */
    .br-empty {
      text-align: center; padding: 80px 20px;
      background: white; border: 2px dashed var(--border);
      border-radius: 16px;
    }
    .br-empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
    .br-empty-title { font-size: 18px; font-weight: 700; margin: 0 0 6px; }
    .br-empty-text { color: var(--text-muted); margin: 0; }

    /* CTA */
    .br-cta-section {
      background:
        radial-gradient(circle at 0% 0%, rgba(255,255,255,.10) 0%, transparent 50%),
        linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 24px; padding: 56px 48px;
      color: white; position: relative; overflow: hidden;
      margin-top: 40px;
    }
    .br-cta-section::before {
      content: ""; position: absolute;
      top: -100px; right: -100px;
      width: 300px; height: 300px;
      background: rgba(255,255,255,.06); border-radius: 50%;
    }
    .br-cta-grid {
      display: grid; grid-template-columns: 1.5fr 1fr;
      gap: 40px; align-items: center; position: relative;
    }
    .br-cta-grid h2 {
      font-size: 32px; font-weight: 800;
      margin: 0 0 14px; letter-spacing: -.02em; line-height: 1.15;
    }
    .br-cta-grid p {
      font-size: 16px; opacity: .92; line-height: 1.6; margin: 0 0 24px;
    }
    .br-cta-benefits {
      display: flex; flex-direction: column; gap: 10px;
    }
    .br-cta-benefit {
      display: flex; align-items: center; gap: 10px; font-size: 14px;
    }
    .br-cta-benefit-check {
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(255,255,255,.20);
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 12px;
    }
    .br-cta-actions {
      display: flex; flex-direction: column; gap: 12px;
    }
    .br-cta-actions .btn {
      background: white; color: #4f46e5;
      font-weight: 700; padding: 14px 24px;
      font-size: 15px; border: none;
      box-shadow: 0 4px 16px rgba(0,0,0,.20);
    }
    .br-cta-actions .btn:hover { transform: translateY(-2px); }
    .br-cta-actions .btn-secondary {
      background: rgba(255,255,255,.12); color: white;
      border: 1.5px solid rgba(255,255,255,.30); box-shadow: none;
    }
    .br-cta-actions .btn-secondary:hover { background: rgba(255,255,255,.20); }

    @media (max-width: 768px) {
      .br-hero h1 { font-size: 32px; }
      .br-hero-lead { font-size: 16px; }
      .br-stats-grid { grid-template-columns: repeat(2, 1fr); }
      .br-grid { grid-template-columns: 1fr; }
      .br-cta-section { padding: 40px 28px; }
      .br-cta-grid { grid-template-columns: 1fr; gap: 28px; }
      .br-cta-grid h2 { font-size: 24px; }
    }
    @media (max-width: 480px) {
      .br-stats-grid { grid-template-columns: 1fr; }
      .br-trust-strip { gap: 14px; }
      .br-card { padding: 22px; }
      .br-rating-block { grid-template-columns: 1fr 1fr; }
    }
  </style>
  <script>(function(){if(localStorage.getItem('bb_darkmode')==='1')document.documentElement.setAttribute('data-theme','dark')})()</script>
</head>
<body>
<div id="header-mount"></div>

<!-- HERO -->
<section class="br-hero">
  <div class="container">
    <span class="br-hero-eyebrow" id="brs-eyebrow"></span>
    <h1 id="brs-h1"></h1>
    <p class="br-hero-lead" id="brs-lead"></p>

    <div class="br-stats-grid">
      <div class="br-stat">
        <div class="br-stat-num" id="stat-brokers">—</div>
        <div class="br-stat-label" id="brs-stat-brokers-lbl"></div>
      </div>
      <div class="br-stat">
        <div class="br-stat-num" id="stat-deals">—</div>
        <div class="br-stat-label" id="brs-stat-deals-lbl"></div>
      </div>
      <div class="br-stat">
        <div class="br-stat-num" id="stat-volume">—</div>
        <div class="br-stat-label" id="brs-stat-volume-lbl"></div>
      </div>
      <div class="br-stat">
        <div class="br-stat-num" id="stat-rating">—</div>
        <div class="br-stat-label" id="brs-stat-rating-lbl"></div>
      </div>
    </div>

    <div class="br-trust-strip">
      <div class="br-trust-item">
        <span class="br-trust-icon">🛡️</span>
        <span id="brs-trust-1"></span>
      </div>
      <div class="br-trust-item">
        <span class="br-trust-icon">📊</span>
        <span id="brs-trust-2"></span>
      </div>
      <div class="br-trust-item">
        <span class="br-trust-icon">⚡</span>
        <span id="brs-trust-3"></span>
      </div>
      <div class="br-trust-item">
        <span class="br-trust-icon">🎯</span>
        <span id="brs-trust-4"></span>
      </div>
    </div>
  </div>
</section>

<!-- SEARCH + FILTERS + GRID -->
<section style="padding-top: 40px;">
  <div class="container">
    <div class="br-search-bar">
      <input type="search" id="search-input" class="br-search-input">
    </div>

    <div class="br-filter-bar">
      <select id="filter-type">
        <option value="" id="brs-ft-all"></option>
        <option value="broker" id="brs-ft-broker"></option>
        <option value="agency" id="brs-ft-agency"></option>
      </select>
      <select id="filter-specialty">
        <option value="" id="brs-fs-all"></option>
      </select>
      <select id="filter-city">
        <option value="" id="brs-fc-all"></option>
      </select>
      <select id="filter-language">
        <option value="" id="brs-fl-all"></option>
        <option value="AZ" id="brs-fl-az"></option>
        <option value="EN" id="brs-fl-en"></option>
        <option value="RU" id="brs-fl-ru"></option>
        <option value="TR" id="brs-fl-tr"></option>
      </select>
      <select id="filter-sort">
        <option value="featured" id="brs-fo-featured"></option>
        <option value="rating" id="brs-fo-rating"></option>
        <option value="deals" id="brs-fo-deals"></option>
        <option value="volume" id="brs-fo-volume"></option>
        <option value="response" id="brs-fo-response"></option>
      </select>
    </div>

    <div class="br-results-bar">
      <div class="br-count-text">
        <strong id="results-count">—</strong> <span id="brs-count-suffix"></span>
      </div>
    </div>

    <div class="br-grid" id="broker-grid"></div>

    <div id="empty-state" class="br-empty" style="display:none;">
      <div class="br-empty-icon">🔍</div>
      <h3 class="br-empty-title" id="brs-empty-h3"></h3>
      <p class="br-empty-text" id="brs-empty-p"></p>
    </div>
  </div>
</section>

<!-- CTA -->
<section style="padding: 60px 0;">
  <div class="container">
    <div class="br-cta-section">
      <div class="br-cta-grid">
        <div>
          <h2 id="brs-cta-h2"></h2>
          <p id="brs-cta-p"></p>
          <div class="br-cta-benefits">
            <div class="br-cta-benefit">
              <span class="br-cta-benefit-check">✓</span>
              <span id="brs-cta-b1"></span>
            </div>
            <div class="br-cta-benefit">
              <span class="br-cta-benefit-check">✓</span>
              <span id="brs-cta-b2"></span>
            </div>
            <div class="br-cta-benefit">
              <span class="br-cta-benefit-check">✓</span>
              <span id="brs-cta-b3"></span>
            </div>
          </div>
        </div>
        <div class="br-cta-actions">
          <a href="#broker-register" class="btn btn-lg" id="brs-cta-join"></a>
          <a href="https://wa.me/994502009088" target="_blank" rel="noopener" class="btn btn-lg btn-secondary" id="brs-cta-wa"></a>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Broker registration -->
<section id="broker-register" style="padding: 20px 0 80px;">
  <div class="container form-wrap">
    <div class="form-card">
      <h2 style="margin:0 0 8px" id="breg-title"></h2>
      <div class="form-note" id="breg-note"></div>
      <form id="broker-form" action="https://formsubmit.co/orkhan@bizbazar.az" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="_subject" value="New broker registration — BizBazar.az">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://bizbazar.az/brokers.html?breg_sent=1#broker-register">
        <input type="hidden" name="form_type" value="broker_registration">
        <div class="form-row">
          <div class="form-field">
            <label id="breg-l-name"></label>
            <input type="text" name="full_name" required>
          </div>
          <div class="form-field">
            <label id="breg-l-company"></label>
            <input type="text" name="company">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label id="breg-l-type"></label>
            <select name="broker_type" id="breg-type"></select>
          </div>
          <div class="form-field">
            <label id="breg-l-city"></label>
            <input type="text" name="city" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label id="breg-l-exp"></label>
            <input type="number" name="experience_years" min="0" required>
          </div>
          <div class="form-field">
            <label id="breg-l-license"></label>
            <input type="text" name="license_number">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field full">
            <label id="breg-l-spec"></label>
            <input type="text" name="specialization" id="breg-spec-input">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field full">
            <label id="breg-l-bio"></label>
            <textarea name="about" required></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label id="breg-l-email"></label>
            <input type="email" name="email" required>
          </div>
          <div class="form-field">
            <label id="breg-l-phone"></label>
            <input type="tel" name="phone" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field full">
            <label id="breg-l-cv"></label>
            <input type="file" id="breg-cv-input" name="attachment" accept=".pdf,.doc,.docx" style="display:none">

      ft_all: "Все типы", ft_broker: "Частный брокер", ft_agency: "Агентство",
      fs_all: "Все специализации",
      fc_all: "Все города",
      fl_all: "Все языки", fl_az: "Азербайджанский", fl_en: "Английский", fl_ru: "Русский", fl_tr: "Турецкий",
      fo_featured: "Рекомендуемые брокеры", fo_rating: "По рейтингу", fo_deals: "По числу сделок", fo_volume: "По объёму сделок", fo_response: "По времени ответа",
      count_suffix: "брокеров найдено",
      empty_h3: "Брокеров не найдено", empty_p: "Попробуйте изменить фильтры.",
      cta_h2: "Вступайте как профессиональный брокер",

      cta_b1: "Проверенный проф. профиль и отображение лицензии",
      cta_b2: "Отзывы клиентов и история сделок",

      cta_join: "Присоединиться как брокер", cta_wa: "Связаться в WhatsApp",
      verified: "✓ Проверен", rating_lbl: "Рейтинг", deals_lbl: "Сделок", closed: "закрыто",
      vol_lbl: "Объём", specialties: "Специализации", response_lbl: "Время ответа", langs_lbl: "Языки",
      hours: "ч", view_profile: "Профиль →", call: "Позвонить"
    }
  };

  function applyBrsCopy() {
    const c = BRS_COPY[getLang()] || BRS_COPY.az;
    document.title = c.doc_title;
    document.getElementById("brs-eyebrow").textContent = c.eyebrow;
    document.getElementById("brs-h1").innerHTML = `${c.h1_pre}<span>${c.h1_em}</span>${c.h1_post}`;
    document.getElementById("brs-lead").textContent = c.lead;
    document.getElementById("brs-stat-brokers-lbl").textContent = c.stat_brokers_lbl;
    document.getElementById("brs-stat-deals-lbl").textContent = c.stat_deals_lbl;
    document.getElementById("brs-stat-volume-lbl").textContent = c.stat_volume_lbl;
    document.getElementById("brs-stat-rating-lbl").textContent = c.stat_rating_lbl;
    document.getElementById("brs-trust-1").textContent = c.trust_1;
    document.getElementById("brs-trust-2").textContent = c.trust_2;
    document.getElementById("brs-trust-3").textContent = c.trust_3;
    document.getElementById("brs-trust-4").textContent = c.trust_4;
    document.getElementById("search-input").placeholder = c.search_ph;
    document.getElementById("brs-ft-all").textContent = c.ft_all;
    document.getElementById("brs-ft-broker").textContent = c.ft_broker;
    document.getElementById("brs-ft-agency").textContent = c.ft_agency;
    document.getElementById("brs-fs-all").textContent = c.fs_all;
    document.getElementById("brs-fc-all").textContent = c.fc_all;
    document.getElementById("brs-fl-all").textContent = c.fl_all;
    document.getElementById("brs-fl-az").textContent = c.fl_az;
    document.getElementById("brs-fl-en").textContent = c.fl_en;
    document.getElementById("brs-fl-ru").textContent = c.fl_ru;
    document.getElementById("brs-fl-tr").textContent = c.fl_tr;
    document.getElementById("brs-fo-featured").textContent = c.fo_featured;
    document.getElementById("brs-fo-rating").textContent = c.fo_rating;
    document.getElementById("brs-fo-deals").textContent = c.fo_deals;
    document.getElementById("brs-fo-volume").textContent = c.fo_volume;
    document.getElementById("brs-fo-response").textContent = c.fo_response;
    document.getElementById("brs-count-suffix").textContent = c.count_suffix;
    document.getElementById("brs-empty-h3").textContent = c.empty_h3;
    document.getElementById("brs-empty-p").textContent = c.empty_p;
    document.getElementById("brs-cta-h2").textContent = c.cta_h2;
    document.getElementById("brs-cta-p").textContent = c.cta_p;
    document.getElementById("brs-cta-b1").textContent = c.cta_b1;
    document.getElementById("brs-cta-b2").textContent = c.cta_b2;
    document.getElementById("brs-cta-b3").textContent = c.cta_b3;
    document.getElementById("brs-cta-join").textContent = c.cta_join;
    document.getElementById("brs-cta-wa").textContent = c.cta_wa;
  }
  applyBrsCopy();

  const [brokers, categories] = await Promise.all([
    loadJSON("data/brokers.json"),
    loadCategories()
  ]);
  const catById = Object.fromEntries(categories.map(c => [c.id, c]));

  // Compute stats
  const totalDeals = brokers.reduce((s, b) => s + (b.deals_closed || 0), 0);
  const totalVolume = brokers.reduce((s, b) => s + (b.total_volume_azn || 0), 0);
  const ratedBrokers = brokers.filter(b => (b.reviews || 0) > 0 && (b.rating || 0) > 0);
  const avgRating = ratedBrokers.length ? ratedBrokers.reduce((s, b) => s + b.rating, 0) / ratedBrokers.length : 0;

  document.getElementById("stat-brokers").textContent = brokers.length;
  document.getElementById("stat-deals").textContent = totalDeals + "+";
  document.getElementById("stat-volume").textContent = (totalVolume / 1000000).toFixed(1) + "M+";
  document.getElementById("stat-rating").textContent = avgRating.toFixed(1) + " ★";

  // Populate specialty filter
  const filterSpec = document.getElementById("filter-specialty");
  const usedSpecs = [...new Set(brokers.flatMap(b => b.specialties))];
  usedSpecs.forEach(sid => {
    const cat = catById[sid];
    if (!cat) return;
    const o = document.createElement("option");
    o.value = sid;
    o.textContent = catLabel(cat);
    filterSpec.appendChild(o);
  });

  // Populate city filter
  const filterCity = document.getElementById("filter-city");
  const usedCities = [...new Set(brokers.map(b => b.city))];
  usedCities.forEach(c => {
    const o = document.createElement("option");
    o.value = c;
    o.textContent = c;
    filterCity.appendChild(o);
  });

  const TYPE_LABELS = {
    az: { broker: "Fərdi broker", agency: "Agentlik" },
    en: { broker: "Individual broker", agency: "Agency" },
    ru: { broker: "Частный брокер", agency: "Агентство" }
  };

  const state = {
    search: "",
    type: "",
    specialty: "",
    city: "",
    language: "",
    sort: "featured"
  };

  function fmtVolume(v) {
    if (v >= 1000000) return (v / 1000000).toFixed(1) + "M";
    if (v >= 1000) return Math.round(v / 1000) + "K";
    return String(v);
  }

  function brokerCardHTML(b) {
    const lang = (typeof getLang === "function") ? getLang() : "az";
    const name = lang === "ru" && b.name_ru ? b.name_ru : b.name;
    const bio = lang === "en" ? b.bio_en : lang === "ru" ? b.bio_ru : b.bio_az;
    const typeLabels = TYPE_LABELS[lang] || TYPE_LABELS.az;
    const hasRating = (b.reviews || 0) > 0 && (b.rating || 0) > 0;
    const newLabel = lang === "en" ? "New" : lang === "ru" ? "Новый" : "Yeni";
    const stars = hasRating ? "★".repeat(Math.floor(b.rating)) + "☆".repeat(5 - Math.floor(b.rating)) : "";

    const BROKER_EXTRA_SPECS = {
      construction: { az: "Tikinti", en: "Construction", ru: "Строительство", icon: "🏗️" },
      insaat:       { az: "İnşaat", en: "Building", ru: "Стройка", icon: "🧱" },
      clinic:       { az: "Klinika", en: "Clinic", ru: "Клиника", icon: "🏥" },
      agriculture:  { az: "Kənd təsərrüfatı", en: "Agriculture", ru: "Сельское хозяйство", icon: "🌾" }
    };
    const specialtyPills = b.specialties.slice(0, 4).map(sid => {
      const cat = catById[sid];
      if (cat) return `<span class="br-specialty-pill">${CATEGORY_ICONS[sid] || "🏢"} ${catLabel(cat)}</span>`;
      const ex = BROKER_EXTRA_SPECS[sid];
      if (ex) return `<span class="br-specialty-pill">${ex.icon} ${ex[lang] || ex.az}</span>`;
      return "";
    }).join("");

    const langTags = b.languages.map(l => `<span class="br-lang-tag">${l}</span>`).join("");
    const waPhone = b.phone.replace(/[^+\d]/g, "");

    const cc = BRS_COPY[lang] || BRS_COPY.az;
    return `
    <article class="br-card${b.featured ? " featured" : ""}">
      <div class="br-card-head">
        <img src="${b.avatar}" alt="${name}" class="br-avatar" loading="lazy">
        <div class="br-name-block">
          <h3 class="br-name">${name}</h3>
          <div class="br-name-meta">
            <span>📍 ${b.city}</span>
            ${b.verified ? `<span class="br-verified-icon">${cc.verified}</span>` : ""}
          </div>
        </div>
      </div>

      <div class="br-tag-row">
        <span class="br-tag ${b.type}">${typeLabels[b.type] || b.type}</span>
        ${b.license_no ? `<span class="br-tag license">🪪 ${b.license_no}</span>` : ""}
      </div>

      <div class="br-rating-block">
        <div class="br-rating-cell">
          <div class="lbl">${cc.rating_lbl}</div>
          <div class="val">${hasRating ? b.rating.toFixed(1) : newLabel}</div>
          <div class="stars-mini">${hasRating ? stars : "—"}</div>
        </div>
        <div class="br-rating-cell">
          <div class="lbl">${cc.deals_lbl}</div>
          <div class="val">${b.deals_closed}</div>
          <div class="stars-mini" style="color:var(--text-muted);font-size:11px">${cc.closed}</div>
        </div>
        <div class="br-rating-cell">
          <div class="lbl">${cc.vol_lbl}</div>
          <div class="val">${fmtVolume(b.total_volume_azn || 0)}</div>
          <div class="stars-mini" style="color:var(--text-muted);font-size:11px">AZN</div>
        </div>
      </div>

      <div>
        <div class="br-section-label">${cc.specialties}</div>
        <div class="br-specialty-pills">${specialtyPills}</div>
      </div>

      <p class="br-bio">${bio}</p>

      <div class="br-meta-row">
        <div class="br-meta-cell">
          <span class="br-meta-cell-label">${cc.response_lbl}</span>
          <span class="br-meta-cell-value">⚡ ${b.response_time_hours} ${cc.hours}</span>
        </div>
        <div class="br-meta-cell">
          <span class="br-meta-cell-label">${cc.langs_lbl}</span>
          <span class="br-meta-cell-value"><div class="br-langs">${langTags}</div></span>
        </div>
      </div>

      <div class="br-actions">
        <a href="broker.html?id=${b.id}" class="btn-primary">${cc.view_profile}</a>
        <a href="https://wa.me/${waPhone}" target="_blank" rel="noopener" class="br-icon-btn wa" title="WhatsApp">💬</a>
        <a href="tel:${b.phone}" class="br-icon-btn" title="${cc.call}">📞</a>
      </div>
    </article>`;
  }

  function render() {
    let list = brokers.slice();

    if (state.search) {
      const q = state.search.toLowerCase();
      list = list.filter(b =>
        (b.name && b.name.toLowerCase().includes(q)) ||
        (b.name_ru && b.name_ru.toLowerCase().includes(q)) ||
        (b.bio_az && b.bio_az.toLowerCase().includes(q))
      );
    }
    if (state.type) list = list.filter(b => b.type === state.type);
    if (state.specialty) list = list.filter(b => b.specialties.includes(state.specialty));
    if (state.city) list = list.filter(b => b.city === state.city);
    if (state.language) list = list.filter(b => b.languages.includes(state.language));

    switch (state.sort) {
      case "rating":   list.sort((a, b) => b.rating - a.rating); break;
      case "deals":    list.sort((a, b) => b.deals_closed - a.deals_closed); break;
      case "volume":   list.sort((a, b) => (b.total_volume_azn || 0) - (a.total_volume_azn || 0)); break;
      case "response": list.sort((a, b) => a.response_time_hours - b.response_time_hours); break;
      default:
        list.sort((a, b) => {
          if (a.featured !== b.featured) return b.featured ? 1 : -1;
          return b.rating - a.rating;
        });
        break;
    }

    document.getElementById("results-count").textContent = list.length;

    const grid = document.getElementById("broker-grid");
    if (!list.length) {
      grid.innerHTML = "";
      document.getElementById("empty-state").style.display = "block";
      return;
    }
    document.getElementById("empty-state").style.display = "none";
    grid.innerHTML = list.map(b => brokerCardHTML(b)).join("");
  }

  document.getElementById("search-input").addEventListener("input", e => { state.search = e.target.value; render(); });
  document.getElementById("filter-type").onchange      = e => { state.type      = e.target.value; render(); };
  document.getElementById("filter-specialty").onchange = e => { state.specialty = e.target.value; render(); };
  document.getElementById("filter-city").onchange      = e => { state.city      = e.target.value; render(); };
  document.getElementById("filter-language").onchange  = e => { state.language  = e.target.value; render(); };
  document.getElementById("filter-sort").onchange      = e => { state.sort      = e.target.value; render(); };

  render();
  applyI18n();
  window.addEventListener("langchange", () => { applyBrsCopy(); render(); });
})();
</script>

      submit: "Submit application",
      sent: "Thank you! Your application was received. Our team will contact you after review.",
      err: "An error occurred. Please try again."
    },
    ru: {
      title: "Зарегистрироваться как брокер",
      note: "Заявка рассматривается в течение 48 часов. После проверки лицензии и опыта ваш профиль публикуется в каталоге брокеров, и наша команда свяжется с вами.",
      name: "Имя и фамилия", company: "Компания / Агентство (если есть)", type: "Тип деятельности",
      type_ind: "Частный брокер", type_ag: "Агентство",
      city: "Город", exp: "Опыт (лет)", license: "Номер лицензии (если есть)",
      spec: "Специализации", spec_ph: "напр.: рестораны, розница, производство",
      bio: "Кратко о себе", email: "Email", phone: "Телефон",
      cv: "Прикрепить CV (если есть)", cv_btn: "📎 Выбрать CV", cv_hint: "PDF или Word, макс. 5 МБ",
      cv_size: "Файл больше 5 МБ.",
      submit: "Отправить заявку",
      sent: "Спасибо! Ваша заявка получена. После проверки наша команда свяжется с вами.",
      err: "Произошла ошибка. Пожалуйста, попробуйте снова."
    }
  };

  function applyReg() {
    const r = REG[(typeof getLang === "function" ? getLang() : "az")] || REG.az;
    document.getElementById("breg-title").textContent = r.title;
    document.getElementById("breg-note").textContent = r.note;
    document.getElementById("breg-l-name").textContent = r.name;
    document.getElementById("breg-l-company").textContent = r.company;
    document.getElementById("breg-l-type").textContent = r.type;
    document.getElementById("breg-l-city").textContent = r.city;
    document.getElementById("breg-l-exp").textContent = r.exp;
    document.getElementById("breg-l-license").textContent = r.license;
    document.getElementById("breg-l-spec").textContent = r.spec;
    document.getElementById("breg-spec-input").placeholder = r.spec_ph;
    document.getElementById("breg-l-bio").textContent = r.bio;
    document.getElementById("breg-l-email").textContent = r.email;
    document.getElementById("breg-l-phone").textContent = r.phone;
    document.getElementById("breg-l-cv").textContent = r.cv;
    document.getElementById("breg-cv-btn").textContent = r.cv_btn;
    document.getElementById("breg-cv-hint").textContent = r.cv_hint;
    document.getElementById("breg-submit").textContent = r.submit;
    const sel = document.getElementById("breg-type");
    sel.innerHTML = `<option value="individual">${r.type_ind}</option><option value="agency">${r.type_ag}</option>`;
    return r;
  }
  let reg = applyReg();
  window.addEventListener("langchange", () => { reg = applyReg(); });

  // CV attachment (optional, <= 5 MB)
  let cvFile = null;
  const cvInput = document.getElementById("breg-cv-input");
  const cvName = document.getElementById("breg-cv-name");
  const cvRemove = document.getElementById("breg-cv-remove");
  document.getElementById("breg-cv-btn").addEventListener("click", () => cvInput.click());
  cvInput.addEventListener("change", () => {
    const f = cvInput.files[0];
    cvInput.value = "";
    if (!f) return;
    if (f.size > 5 * 1024 * 1024) { alert(reg.cv_size); return; }
    cvFile = f;
    cvName.textContent = f.name + " (" + Math.round(f.size / 1024) + " KB)";
    cvRemove.style.display = "inline";
  });
  cvRemove.addEventListener("click", () => {
    cvFile = null; cvName.textContent = ""; cvRemove.style.display = "none";
  });

  const form = document.getElementById("broker-form");
  // Native POST to FormSubmit (supports file attachments); _next redirects back here
  form.addEventListener("submit", () => {
    const dt = new DataTransfer();
    if (cvFile) dt.items.add(cvFile);
    cvInput.files = dt.files;
    document.getElementById("breg-submit").disabled = true;
  });

  // Show success message after FormSubmit redirects back
  if (new URLSearchParams(location.search).get("breg_sent") === "1") {
    form.style.display = "none";
    const ok = document.getElementById("breg-success");
    ok.textContent = reg.sent;
    ok.style.display = "block";
    setTimeout(() => ok.scrollIntoView({ behavior: "smooth", block: "center" }), 400);
  }
})();
</script>
</body>
</html>
