<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Broker profili — BizBazar.az</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="description" content="Yoxlanmış biznes brokeri profili. Reytinqlər, sövdələşmə tarixçəsi, ixtisaslaşmalar və birbaşa əlaqə.">
  <meta name="keywords" content="biznes broker, peşəkar broker, biznes agentlik">
  <meta name="author" content="BizBazar.az">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Broker profili — BizBazar.az">
  <meta property="og:description" content="Yoxlanmış biznes brokeri profili.">
  <meta property="og:url" content="https://bizbazar.az/broker.html">
  <meta property="og:image" content="https://bizbazar.az/favicon.svg">
  <meta property="og:site_name" content="BizBazar.az">
  <meta property="og:locale" content="az_AZ">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://bizbazar.az/broker.html">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ==== HERO ==== */
    .bp-hero {
      background:
        radial-gradient(circle at 20% 0%, rgba(99,102,241,.14) 0%, transparent 50%),
        radial-gradient(circle at 80% 100%, rgba(168,85,247,.10) 0%, transparent 50%),
        linear-gradient(180deg, #f5f3ff 0%, #ffffff 100%);
      padding: 56px 0 36px;
    }
    .bp-back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: #4f46e5; font-size: 14px; font-weight: 600;
      text-decoration: none; margin-bottom: 24px;
    }
    .bp-back-link:hover { text-decoration: underline; }

    .bp-hero-card {
      display: flex; gap: 28px; align-items: flex-start;
      flex-wrap: wrap;
    }
    .bp-avatar {
      width: 120px; height: 120px;
      border-radius: 24px; object-fit: cover;
      border: 4px solid white;
      box-shadow: 0 8px 24px rgba(99,102,241,.20);
      flex-shrink: 0;
    }
    .bp-hero-info { flex: 1; min-width: 280px; }
    .bp-name {
      font-size: 34px; font-weight: 800;
      margin: 0 0 8px; letter-spacing: -.02em; line-height: 1.15;
    }
    .bp-meta-row {
      display: flex; align-items: center; gap: 16px;
      flex-wrap: wrap; font-size: 14px; color: var(--text-muted);
      margin-bottom: 14px;
    }
    .bp-meta-row .dot { color: #cbd5e1; }
    .bp-rating-stars { color: #f59e0b; letter-spacing: 1px; font-size: 16px; }
    .bp-rating-num { color: var(--text); font-weight: 700; }

    .bp-badges {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .bp-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
    }
    .bp-badge.type-broker { background: #dbeafe; color: #1d4ed8; }
    .bp-badge.type-agency { background: #fef3c7; color: #b45309; }
    .bp-badge.verified    { background: #d1fae5; color: #065f46; }
    .bp-badge.license     { background: #f0fdf4; color: #166534; font-family: ui-monospace, monospace; }
    .bp-badge.featured    { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }

    /* ==== STATS ==== */
    .bp-stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 16px; margin-top: 28px;
    }
    .bp-stat {
      background: white; border: 1px solid var(--border);
      border-radius: 14px; padding: 18px;
    }
    .bp-stat .lbl {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      font-weight: 600; margin-bottom: 4px;
    }
    .bp-stat .val {
      font-size: 22px; font-weight: 800; color: var(--text);
      letter-spacing: -.02em; line-height: 1.1;
    }
    .bp-stat .val.small { font-size: 15px; }
    .bp-stat .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ==== BODY LAYOUT ==== */
    .bp-body { padding: 40px 0 60px; }
    .bp-body-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 32px;
      align-items: flex-start;
    }
    .bp-main { min-width: 0; }
    .bp-sidebar { position: sticky; top: 24px; }

    /* sections */
    .bp-section {
      background: white; border: 1px solid var(--border);
      border-radius: 16px; padding: 28px;
      margin-bottom: 20px;
    }
    .bp-section h2 {
      margin: 0 0 14px; font-size: 18px; font-weight: 700;
      letter-spacing: -.01em;
    }
    .bp-bio {
      color: var(--text); font-size: 15px;
      line-height: 1.65; margin: 0;
    }

    .bp-specialty-pills {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 14px;
    }
    .bp-specialty-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: #f5f3ff; color: #4338ca;
      border-radius: 999px; padding: 6px 14px;
      font-size: 13px; font-weight: 500;
    }

    .bp-langs {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px;
    }
    .bp-lang {
      background: #e2e8f0; color: #374151;
      border-radius: 6px; padding: 4px 12px;
      font-size: 13px; font-weight: 600;
    }

    /* contact card (sidebar) */
    .bp-contact-card {
      background: white; border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,.04);
    }
    .bp-contact-title {
      font-size: 13px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      font-weight: 600; margin-bottom: 14px;
    }
    .bp-contact-btns {
      display: flex; flex-direction: column; gap: 10px;
    }
    .bp-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 16px; border-radius: 10px;
      font-weight: 700; font-size: 14px;
      text-decoration: none; border: none; cursor: pointer;
      transition: all .15s ease;
    }
    .bp-btn-wa {
      background: #25d366; color: white;
      box-shadow: 0 4px 12px rgba(37,211,102,.30);
    }
    .bp-btn-wa:hover {
      background: #1ebe5c; transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(37,211,102,.40);
    }
    .bp-btn-phone {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      box-shadow: 0 4px 12px rgba(99,102,241,.30);
    }
    .bp-btn-phone:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(99,102,241,.40);
    }
    .bp-btn-email {
      background: #f1f5f9; color: var(--text);
      border: 1.5px solid var(--border);
    }
    .bp-btn-email:hover { background: #e2e8f0; }

    .bp-contact-info {
      margin-top: 16px; padding-top: 16px;
      border-top: 1px dashed var(--border);
      font-size: 13px; line-height: 1.65;
    }
    .bp-contact-info .row {
      display: flex; justify-content: space-between;
      padding: 4px 0;
    }
    .bp-contact-info .lbl { color: var(--text-muted); }
    .bp-contact-info .val { color: var(--text); font-weight: 600; }

    /* listings */
    .bp-listings-section h2 {
      font-size: 22px; margin: 0 0 18px;
      letter-spacing: -.01em;
    }
    .bp-empty-listings {
      background: #f8fafc; border-radius: 12px;
      padding: 40px; text-align: center; color: var(--text-muted);
    }

    /* not-found */
    .bp-not-found {
      text-align: center; padding: 100px 0;
    }
    .bp-not-found h2 { font-size: 24px; margin: 0 0 12px; }

    /* responsive */
    @media (max-width: 900px) {
      .bp-body-grid { grid-template-columns: 1fr; }
      .bp-sidebar { position: static; }
    }
    @media (max-width: 640px) {
      .bp-name { font-size: 26px; }
      .bp-avatar { width: 96px; height: 96px; }
      .bp-stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
  <script>(function(){if(localStorage.getItem('bb_darkmode')==='1')document.documentElement.setAttribute('data-theme','dark')})()</script>
</head>
<body>
<div id="header-mount"></div>

<div id="bp-root"></div>

<div id="footer-mount"></div>
<script src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
<script>
(async function(){
  mountLayout("brokers");

  const BP_COPY = {
    az: {
      not_found_h2: "Broker tapılmadı",
      not_found_p: "Axtardığınız broker mövcud deyil və ya silinib.",
      back_to_brokers: "← Bütün brokerlərə qayıt",
      browse_all: "Bütün brokerlərə bax",
      browse_listings: "Bütün elanlara bax",
      verified: "✓ Yoxlanmış",
      premium: "★ Premium",
      reviews: "rəy",
      stat_deals: "Sövdələşmə", stat_deals_sub: "bağlanıb",
      stat_volume: "Ümumi həcm", stat_volume_sub: "satılmış biznes",
      stat_response: "Cavab vaxtı", stat_response_sub: "orta hesabla",
      stat_member: "Üzvlük", stat_member_sub: "tarixindən",
      hours: "saat",
      type_broker: "Fərdi broker", type_agency: "Agentlik",
      about_broker: "Broker haqqında", about_agency: "Agentlik haqqında",
      specialties: "İxtisaslaşmalar",
      listings_broker: "Brokerin elanları", listings_agency: "Agentliyin elanları",
      no_listings: "Bu brokerin hazırda aktiv elanı yoxdur.",
      contact: "Əlaqə",
      email_send: "✉️ E-mail göndər",
      city: "Şəhər", response: "Cavab vaxtı", langs: "Dillər",
      locale: "az-AZ"
    },
    en: {
      not_found_h2: "Broker not found",
      not_found_p: "The broker you're looking for doesn't exist or has been removed.",
      back_to_brokers: "← Back to all brokers",
      browse_all: "Browse all brokers",
      browse_listings: "Browse all listings",
      verified: "✓ Verified",
      premium: "★ Premium",
      reviews: "reviews",
      stat_deals: "Deals", stat_deals_sub: "closed",
      stat_volume: "Total volume", stat_volume_sub: "businesses sold",
      stat_response: "Response time", stat_response_sub: "on average",
      stat_member: "Member", stat_member_sub: "since",
      hours: "hrs",
      type_broker: "Individual broker", type_agency: "Agency",
      about_broker: "About the broker", about_agency: "About the agency",
      specialties: "Specialties",
      listings_broker: "Broker's listings", listings_agency: "Agency's listings",
      no_listings: "This broker has no active listings right now.",
      contact: "Contact",
      email_send: "✉️ Send email",
      city: "City", response: "Response time", langs: "Languages",
      locale: "en-GB"
    },
    ru: {
      not_found_h2: "Брокер не найден",
      not_found_p: "Брокер, которого вы ищете, не существует или был удалён.",
      back_to_brokers: "← Назад ко всем брокерам",
      browse_all: "Смотреть всех брокеров",
      browse_listings: "Все объявления",
      verified: "✓ Проверен",
      premium: "★ Премиум",
      reviews: "отзывов",
      stat_deals: "Сделок", stat_deals_sub: "закрыто",
      stat_volume: "Общий объём", stat_volume_sub: "проданных бизнесов",
      stat_response: "Время ответа", stat_response_sub: "в среднем",
      stat_member: "Участник", stat_member_sub: "с",
      hours: "ч",
      type_broker: "Частный брокер", type_agency: "Агентство",
      about_broker: "О брокере", about_agency: "Об агентстве",
      specialties: "Специализации",
      listings_broker: "Объявления брокера", listings_agency: "Объявления агентства",
      no_listings: "У этого брокера пока нет активных объявлений.",
      contact: "Контакт",
      email_send: "✉️ Написать email",
      city: "Город", response: "Время ответа", langs: "Языки",
      locale: "ru-RU"
    }
  };

  const brokerId = new URLSearchParams(location.search).get("id");
  const [brokers, listings, categories] = await Promise.all([
    loadJSON("data/brokers.json"),
    loadListings(),
    loadCategories()
  ]);
  const catById = Object.fromEntries(categories.map(c => [c.id, c]));
  const root = document.getElementById("bp-root");

  // If no id, redirect to brokers directory
  if (!brokerId) {
    location.href = "brokers.html";
    return;
  }

  const broker = brokers.find(b => b.id === brokerId);

  function fmtVolume(v) {
    if (!v) return "—";
    if (v >= 1000000) return (v / 1000000).toFixed(1) + "M AZN";
    if (v >= 1000) return Math.round(v / 1000) + "K AZN";
    return fmtAZN(v);
  }

  function render() {
    const c = BP_COPY[getLang()] || BP_COPY.az;

    if (!broker) {
      root.innerHTML = `
        <section style="padding: 60px 0;">
          <div class="container">
            <div class="bp-not-found">
              <h2>${c.not_found_h2}</h2>
              <p style="color:var(--text-muted);margin:0 0 18px">${c.not_found_p}</p>
              <a href="brokers.html" class="bp-btn bp-btn-phone" style="display:inline-flex;text-decoration:none;padding:12px 24px;">${c.browse_all}</a>
            </div>
          </div>
        </section>`;
      return;
    }

    const lang = getLang();
    const name = lang === "ru" && broker.name_ru ? broker.name_ru : broker.name;
    const bio = lang === "en" ? broker.bio_en : lang === "ru" ? broker.bio_ru : broker.bio_az;
    document.title = name + " — BizBazar.az";

    const brokerListings = listings.filter(l => l.broker_id === broker.id);
    const stars = "★".repeat(Math.floor(broker.rating)) + "☆".repeat(5 - Math.floor(broker.rating));
    const memberSince = new Date(broker.member_since + "-01")
      .toLocaleDateString(c.locale, { month: "long", year: "numeric" });

    const typeLabel = broker.type === "agency" ? c.type_agency : c.type_broker;
    const aboutHeading = broker.type === "agency" ? c.about_agency : c.about_broker;
    const listingsHeading = broker.type === "agency" ? c.listings_agency : c.listings_broker;

    const specialtiesHTML = broker.specialties.map(s => {
      const cat = catById[s];
      const icon = CATEGORY_ICONS[s] || "🏢";
      return `<span class="bp-specialty-pill">${icon} ${catLabel(cat)}</span>`;
    }).join("");

    const langsHTML = broker.languages.map(l => `<span class="bp-lang">${l}</span>`).join("");
    const waPhone = broker.phone.replace(/[^+\d]/g, "");

    root.innerHTML = `
      <section class="bp-hero">
        <div class="container">
          <a href="brokers.html" class="bp-back-link">${c.back_to_brokers}</a>

          <div class="bp-hero-card">
            <img src="${broker.avatar}" alt="${name}" class="bp-avatar">
            <div class="bp-hero-info">
              <div class="bp-badges">
                <span class="bp-badge ${broker.type === 'agency' ? 'type-agency' : 'type-broker'}">${broker.type === 'agency' ? '🏢 ' : '👤 '}${typeLabel}</span>
                ${broker.verified ? `<span class="bp-badge verified">${c.verified}</span>` : ""}
                ${broker.featured ? `<span class="bp-badge featured">${c.premium}</span>` : ""}
                ${broker.license_no ? `<span class="bp-badge license">🪪 ${broker.license_no}</span>` : ""}
              </div>
              <h1 class="bp-name">${name}</h1>
              <div class="bp-meta-row">
                <span>📍 ${broker.city}</span>
                <span class="dot">·</span>
                <span><span class="bp-rating-stars">${stars}</span> <span class="bp-rating-num">${broker.rating.toFixed(1)}</span> <span style="color:var(--text-muted)">(${broker.reviews} ${c.reviews})</span></span>
              </div>
            </div>
          </div>

          <div class="bp-stats-grid">
            <div class="bp-stat">
              <div class="lbl">${c.stat_deals}</div>
              <div class="val">${broker.deals_closed}</div>
              <div class="sub">${c.stat_deals_sub}</div>
            </div>
            <div class="bp-stat">
              <div class="lbl">${c.stat_volume}</div>
              <div class="val">${fmtVolume(broker.total_volume_azn)}</div>
              <div class="sub">${c.stat_volume_sub}</div>
            </div>
            <div class="bp-stat">
              <div class="lbl">${c.stat_response}</div>
              <div class="val">⚡ ${broker.response_time_hours} ${c.hours}</div>
              <div class="sub">${c.stat_response_sub}</div>
            </div>
            <div class="bp-stat">
              <div class="lbl">${c.stat_member}</div>
              <div class="val small">${memberSince}</div>
              <div class="sub">${c.stat_member_sub}</div>
            </div>
          </div>
        </div>
      </section>

      <section class="bp-body">
        <div class="container">
          <div class="bp-body-grid">
            <div class="bp-main">
              <div class="bp-section">
                <h2>${aboutHeading}</h2>
                <p class="bp-bio">${bio}</p>
              </div>

              <div class="bp-section">
                <h2>${c.specialties}</h2>
                <div class="bp-specialty-pills">${specialtiesHTML}</div>
              </div>

              <div class="bp-listings-section">
                <h2>${listingsHeading} (${brokerListings.length})</h2>
                ${brokerListings.length
                  ? `<div class="listing-grid">${brokerListings.map(l => listingCardHTML(l, catById)).join("")}</div>`
                  : `<div class="bp-empty-listings">
                      <p style="margin:0 0 12px">${c.no_listings}</p>
                      <a href="listings.html" class="bp-btn bp-btn-phone" style="display:inline-flex;text-decoration:none;padding:10px 20px;">${c.browse_listings}</a>
                     </div>`
                }
              </div>
            </div>

            <aside class="bp-sidebar">
              <div class="bp-contact-card">
                <div class="bp-contact-title">${c.contact}</div>
                <div class="bp-contact-btns">
                  <a href="https://wa.me/${waPhone}" target="_blank" rel="noopener" class="bp-btn bp-btn-wa">💬 WhatsApp</a>
                  <a href="tel:${broker.phone}" class="bp-btn bp-btn-phone">📞 ${broker.phone}</a>
                  ${broker.email ? `<a href="mailto:${broker.email}" class="bp-btn bp-btn-email">${c.email_send}</a>` : ""}
                </div>
                <div class="bp-contact-info">
                  <div class="row"><span class="lbl">${c.city}</span><span class="val">${broker.city}</span></div>
                  <div class="row"><span class="lbl">${c.response}</span><span class="val">${broker.response_time_hours} ${c.hours}</span></div>
                  <div class="row" style="align-items:flex-start"><span class="lbl">${c.langs}</span><span class="val"><div class="bp-langs">${langsHTML}</div></span></div>
                </div>
              </div>
            </aside>
          </div>
        </div>
      </section>`;

    applyI18n();
  }

  render();
  window.addEventListener("langchange", render);
})();
</script>
</body>
</html>
