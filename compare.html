<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Biznesləri müqayisə et — BizBazar.az</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- SEO -->
  <meta name="description" content="Maraqlandığınız bizneslərini yan-yana müqayisə edin. Qiymət, gəlir, mənfəət, geri ödəmə müddəti.">
  <meta name="keywords" content="biznes müqayisə, biznes seçim">
  <meta name="author" content="BizBazar.az">
  <meta name="robots" content="index, follow">

  <!-- Open Graph (for social sharing) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Biznesləri müqayisə et — BizBazar.az">
  <meta property="og:description" content="Maraqlandığınız bizneslərini yan-yana müqayisə edin. Qiymət, gəlir, mənfəət, geri ödəmə müddəti.">
  <meta property="og:url" content="https://bizbazar.az/compare.html">
  <meta property="og:image" content="https://bizbazar.az/favicon.svg">
  <meta property="og:site_name" content="BizBazar.az">
  <meta property="og:locale" content="az_AZ">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Biznesləri müqayisə et — BizBazar.az">
  <meta name="twitter:description" content="Maraqlandığınız bizneslərini yan-yana müqayisə edin. Qiymət, gəlir, mənfəət, geri ödəmə müddəti.">
  <meta name="twitter:image" content="https://bizbazar.az/favicon.svg">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://bizbazar.az/compare.html">

  <link rel="stylesheet" href="css/styles.css">
  <style>
    .compare-table-wrap { overflow-x: auto; }
    .compare-table { width: 100%; border-collapse: collapse; min-width: 600px; }
    .compare-table th, .compare-table td { border: 1px solid #e2e8f0; padding: 14px 18px; text-align: left; vertical-align: top; }
    .compare-table thead th { background: #1e3a5f; color: #fff; font-weight: 600; font-size: 14px; position: sticky; top: 0; }
    .compare-table thead th:first-child { background: #f8fafc; color: #374151; }
    .compare-table tbody tr:nth-child(even) td { background: #f8fafc; }
    .compare-table td:first-child { font-weight: 600; font-size: 14px; color: #374151; background: #fff; white-space: nowrap; }
    .compare-table tbody tr:hover td { background: #eff6ff; }
    .compare-table .listing-icon { font-size: 32px; display: block; margin-bottom: 6px; }
    .compare-table .col-title { font-weight: 700; font-size: 15px; display: block; margin-bottom: 4px; }
    .compare-table .col-price { font-weight: 800; font-size: 17px; color: #1e3a5f; }
    .compare-table .col-cat { font-size: 12px; color: #64748b; margin-bottom: 4px; }
    .remove-btn { font-size: 12px; background: #fee2e2; color: #b91c1c; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; margin-top: 8px; }
    .remove-btn:hover { background: #fecaca; }
    .compare-empty { text-align: center; padding: 100px 0; color: #64748b; }
    .compare-empty .icon { font-size: 56px; margin-bottom: 20px; }
    .featured-tag { display: inline-block; background: #f59e0b; color: #fff; font-size: 10px; font-weight: 700; border-radius: 4px; padding: 2px 6px; letter-spacing: .5px; vertical-align: middle; margin-left: 6px; }
    .profit-margin { font-size: 13px; color: #64748b; }
    .add-more-bar { margin-bottom: 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  </style>
  <script>(function(){if(localStorage.getItem('bb_darkmode')==='1')document.documentElement.setAttribute('data-theme','dark')})()</script>
</head>
<body>
<div id="header-mount"></div>

<div class="page-header">
  <div class="container">
    <h1 id="cmp-h1"></h1>
    <p id="cmp-sub"></p>
  </div>
</div>

<section>
  <div class="container">
    <div id="compare-root"></div>
  </div>
</section>

<div id="footer-mount"></div>
<script src="js/app.js"></script>
<script>
(async function(){
  mountLayout("listings");

  const CMP_COPY = {
    az: {
      doc_title: "Biznesləri müqayisə et — BizBazar.az",
      h1: "Elanları müqayisə et",
      sub: "Yan-yana əsas göstəriciləri qiymətləndir",
      empty_h2: "Müqayisə üçün ən azı 2 elan seçin",
      empty_p: 'Elan səhifəsindən "Müqayisəyə əlavə et" düyməsini istifadə edin<br>və ya aşağıdan elanları seçin.',
      browse_btn: "Elanlara bax →",
      add_btn: "+ Elan əlavə et",
      compare_count: (n) => `${n} elan müqayisə edilir`,
      indicator: "Göstərici",
      featured: "SEÇİLMİŞ",
      remove: "✕ Sil",
      r_price: "Qiymət", r_revenue: "Aylıq gəlir", r_profit: "Aylıq mənfəət",
      r_margin: "Mənfəət marjası %", r_payback: "Geri ödəmə (ay)",
      r_area: "Sahə (m²)", r_staff: "İşçi sayı", r_years: "Fəaliyyət ili",
      r_equipment: "Avadanlıq", r_license: "Lisenziya", r_location: "Şəhər / Rayon",
      yes: "✅ Bəli", no: "❌ Xeyr",
      months: "ay", years: "il"
    },
    en: {
      doc_title: "Compare businesses — BizBazar.az",
      h1: "Compare listings",
      sub: "Evaluate key metrics side by side",
      empty_h2: "Pick at least 2 listings to compare",
      empty_p: 'Use the "Add to compare" button on a listing page<br>or pick listings from below.',
      browse_btn: "Browse listings →",
      add_btn: "+ Add listing",
      compare_count: (n) => `${n} listings compared`,
      indicator: "Metric",
      featured: "FEATURED",
      remove: "✕ Remove",
      r_price: "Price", r_revenue: "Monthly revenue", r_profit: "Monthly profit",
      r_margin: "Profit margin %", r_payback: "Payback (months)",
      r_area: "Area (m²)", r_staff: "Staff count", r_years: "Years in operation",
      r_equipment: "Equipment", r_license: "License", r_location: "City / District",
      yes: "✅ Yes", no: "❌ No",
      months: "mo", years: "yrs"
    },
    ru: {
      doc_title: "Сравнить бизнесы — BizBazar.az",
      h1: "Сравнить объявления",
      sub: "Сравните ключевые показатели рядом",
      empty_h2: "Выберите минимум 2 объявления для сравнения",
      empty_p: 'Нажмите "Добавить к сравнению" на странице объявления<br>или выберите объявления ниже.',
      browse_btn: "К объявлениям →",
      add_btn: "+ Добавить объявление",
      compare_count: (n) => `Сравнивается объявлений: ${n}`,
      indicator: "Показатель",
      featured: "РЕКОМЕНДУЕМОЕ",
      remove: "✕ Убрать",
      r_price: "Цена", r_revenue: "Доход в месяц", r_profit: "Прибыль в месяц",
      r_margin: "Маржа прибыли %", r_payback: "Окупаемость (мес.)",
      r_area: "Площадь (м²)", r_staff: "Сотрудников", r_years: "Лет работы",
      r_equipment: "Оборудование", r_license: "Лицензия", r_location: "Город / Район",
      yes: "✅ Да", no: "❌ Нет",
      months: "мес.", years: "лет"
    }
  };
  const cmp = () => CMP_COPY[getLang()] || CMP_COPY.az;

  const params = new URLSearchParams(location.search);
  const idsParam = params.get("ids") || "";
  let ids = idsParam ? idsParam.split(",").map(s => s.trim()).filter(Boolean) : [];

  const [listings, categories] = await Promise.all([loadListings(), loadCategories()]);
  const catById = Object.fromEntries(categories.map(c => [c.id, c]));
  const listingById = Object.fromEntries(listings.map(l => [l.id, l]));

  function render() {
    const c = cmp();
    document.title = c.doc_title;
    document.getElementById("cmp-h1").textContent = c.h1;
    document.getElementById("cmp-sub").textContent = c.sub;

    const root = document.getElementById("compare-root");
    const selected = ids.map(id => listingById[id]).filter(Boolean);

    if (selected.length < 2) {
      root.innerHTML = `
        <div class="compare-empty">
          <div class="icon">⚖️</div>
          <h2>${c.empty_h2}</h2>
          <p>${c.empty_p}</p>
          <a href="listings.html" class="btn btn-primary" style="margin-top:20px">${c.browse_btn}</a>
        </div>`;
      applyI18n();
      return;
    }

    const rows = [
      { label: c.r_price, key: l => `<span class="col-price">${fmtAZN(l.price_azn)}</span><br><small style="color:#64748b">${fmtUSD(l.price_azn)}</small>` },
      { label: c.r_revenue, key: l => fmtAZN(l.monthly_revenue_azn) },
      { label: c.r_profit, key: l => fmtAZN(l.monthly_profit_azn) },
      { label: c.r_margin, key: l => {
        if (!l.monthly_revenue_azn || !l.monthly_profit_azn) return "—";
        return ((l.monthly_profit_azn / l.monthly_revenue_azn) * 100).toFixed(1) + "%";
      }},
      { label: c.r_payback, key: l => {
        if (!l.monthly_profit_azn || l.monthly_profit_azn <= 0) return "—";
        return Math.round(l.price_azn / l.monthly_profit_azn) + " " + c.months;
      }},
      { label: c.r_area, key: l => fmtNum(l.area_m2) + " m²" },
      { label: c.r_staff, key: l => l.staff_count },
      { label: c.r_years, key: l => l.operating_years + " " + c.years },
      { label: c.r_equipment, key: l => l.equipment_included ? c.yes : c.no },
      { label: c.r_license, key: l => l.license_included ? c.yes : c.no },
      { label: c.r_location, key: l => l.district + ", " + l.city },
    ];

    const headerCols = selected.map(l => {
      const cat = catById[l.category];
      const icon = CATEGORY_ICONS[l.category] || "🏢";
      return `<th>
        <span class="listing-icon">${icon}</span>
        <span class="col-cat">${catLabel(cat)}</span>
        <a class="col-title" href="listing.html?id=${l.id}" style="color:#fff;text-decoration:underline;">${locField(l, "title")}</a>
        ${l.featured ? `<span class="featured-tag">${c.featured}</span>` : ""}
        <br>
        <button class="remove-btn" data-id="${l.id}">${c.remove}</button>
      </th>`;
    }).join("");

    const bodyRows = rows.map(row => {
      const cells = selected.map(l => `<td>${row.key(l)}</td>`).join("");
      return `<tr><td>${row.label}</td>${cells}</tr>`;
    }).join("");

    root.innerHTML = `
      <div class="add-more-bar">
        <a href="listings.html" class="btn btn-ghost" style="font-size:14px">${c.add_btn}</a>
        <span style="color:#64748b;font-size:14px">${c.compare_count(selected.length)}</span>
      </div>
      <div class="compare-table-wrap">
        <table class="compare-table">
          <thead>
            <tr>
              <th style="min-width:160px">${c.indicator}</th>
              ${headerCols}
            </tr>
          </thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>`;

    root.querySelectorAll(".remove-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        ids = ids.filter(id => id !== btn.dataset.id);
        const newUrl = new URL(location.href);
        if (ids.length) newUrl.searchParams.set("ids", ids.join(","));
        else newUrl.searchParams.delete("ids");
        history.replaceState({}, "", newUrl);
        render();
      });
    });

    applyI18n();
  }

  render();
  window.addEventListener("langchange", render);
})();
</script>
</body>
</html>
